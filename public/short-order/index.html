<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d0906">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Short Order">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>SHORT ORDER — kitchen brawl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --grease:#1a120b; --char:#0d0906; --cream:#f4e4c1; --flame:#ff6a1e;
    --copper:#c77b3b; --steel:#7fb2d6; --herb:#8fc866; --tomato:#ff3b30; --ink:#2a1c10;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--char);color:var(--cream);
    font-family:"DM Mono",ui-monospace,monospace;-webkit-user-select:none;user-select:none;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;
    font-family:"DM Mono",monospace;opacity:0;transition:opacity .4s}
  #hud.on{opacity:1}
  .disp{font-family:"Anton",Impact,sans-serif;letter-spacing:.02em}

  /* player plate: health + weapon */
  #plate{position:absolute;left:22px;top:20px;width:min(42%,340px)}
  #hpwrap{height:20px;background:#00000066;border:2px solid #00000088;border-radius:2px;
    box-shadow:0 3px 0 #0007, inset 0 0 0 1px #ffffff14;overflow:hidden;position:relative}
  #hpfill{position:absolute;inset:0;transform-origin:left;transform:scaleX(1);
    background:linear-gradient(90deg,var(--tomato),var(--flame));transition:transform .18s cubic-bezier(.2,.8,.2,1)}
  #hpfill.low{animation:hppanic .35s infinite}
  @keyframes hppanic{50%{filter:brightness(1.9)}}
  #hpghost{position:absolute;inset:0;transform-origin:left;transform:scaleX(1);
    background:#ffffff33;transition:transform .55s .12s ease-out}
  #hplabel{position:absolute;left:8px;top:1px;font-size:12px;line-height:18px;color:#fff;
    text-shadow:0 1px 1px #000;letter-spacing:.14em}
  #wpnrow{display:flex;align-items:center;gap:8px;margin-top:8px}
  #wpnname{font-family:"Anton",sans-serif;font-size:19px;color:var(--cream);
    text-shadow:0 2px 0 #0009;letter-spacing:.03em;white-space:nowrap}
  #pips{display:flex;gap:3px;flex-wrap:wrap;max-width:200px}
  .pip{width:9px;height:9px;background:var(--herb);box-shadow:0 0 6px #8fc86688, inset 0 0 0 1px #0004;
    transform:rotate(45deg);border-radius:1px}
  .pip.low{background:var(--flame);box-shadow:0 0 6px #ff6a1e88}
  .pip.crit{background:var(--tomato);box-shadow:0 0 8px #ff3b30aa}
  .pip.spent{background:#3a2a1a;box-shadow:none;opacity:.5}

  /* cooks-left counter */
  #cooks{position:absolute;right:22px;top:18px;text-align:right}
  #cooksN{font-family:"Anton",sans-serif;font-size:52px;line-height:.9;color:var(--cream);
    text-shadow:0 3px 0 #0009,0 0 22px #ff6a1e55}
  #cooksL{font-size:11px;letter-spacing:.35em;color:#c9a978;margin-top:2px}
  #waveL{font-size:10px;letter-spacing:.3em;color:#8a7250;margin-top:5px}

  /* combo */
  #combo{position:absolute;left:50%;bottom:60px;transform:translateX(-50%) scale(.6);
    text-align:center;opacity:0;transition:opacity .12s}
  #combo.on{opacity:1}
  #comboN{font-family:"Anton",sans-serif;font-size:60px;line-height:.85;color:var(--flame);
    text-shadow:0 3px 0 #0009,0 0 26px #ff6a1eaa}
  #comboL{font-size:12px;letter-spacing:.3em;color:#f4e4c1cc}

  /* prompt (pick up weapon) */
  #prompt{position:absolute;left:50%;bottom:32%;transform:translateX(-50%) translateY(10px);
    background:#120b06e0;border:2px solid var(--flame);border-radius:4px;padding:8px 14px;
    box-shadow:0 6px 0 #0008;opacity:0;transition:opacity .15s,transform .15s;text-align:center}
  #prompt.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #prompt b{font-family:"Anton",sans-serif;color:var(--flame);font-size:15px}
  #prompt .k{display:inline-grid;place-items:center;min-width:22px;height:22px;padding:0 5px;margin:0 2px;
    background:var(--cream);color:var(--ink);border-radius:4px;font-weight:700;font-size:12px;
    box-shadow:0 2px 0 #0007;vertical-align:middle}

  /* floating hit words layer */
  #words{position:absolute;inset:0;overflow:hidden}
  .word{position:absolute;font-family:"Anton",sans-serif;transform:translate(-50%,-50%) skewX(-7deg);
    text-shadow:5px 5px 0 #0009;will-change:transform,opacity;white-space:nowrap;
    -webkit-text-stroke:5px #140c07;paint-order:stroke fill;letter-spacing:.01em}

  /* toast */
  #toast{position:absolute;left:50%;top:76px;transform:translateX(-50%) translateY(-8px);
    background:#120b06e0;border-left:4px solid var(--copper);padding:7px 14px;font-size:13px;
    letter-spacing:.08em;color:var(--cream);opacity:0;transition:opacity .2s,transform .2s;box-shadow:0 4px 0 #0007}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- cards / overlays ---------- */
  #veil{position:fixed;inset:0;z-index:20;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 30%, #2a1a0c 0%, #0d0906 70%);
    transition:opacity .5s}
  #veil.hide{opacity:0;pointer-events:none}
  .card{text-align:center;max-width:min(92%,640px);padding:24px}
  .kick{font-size:12px;letter-spacing:.5em;color:var(--flame);margin-bottom:10px}
  .title{font-family:"Anton",sans-serif;font-size:clamp(52px,calc(var(--u,6.4px)*15),150px);line-height:.82;
    color:var(--cream);text-shadow:0 6px 0 #000a, 0 0 44px #ff6a1e44;letter-spacing:.01em}
  .title .b{color:var(--flame)}
  .sub{margin:14px auto 0;max-width:440px;color:#d9c4a0;font-size:14px;line-height:1.6}
  .btn{pointer-events:auto;cursor:pointer;margin-top:26px;display:inline-block;
    font-family:"Anton",sans-serif;font-size:24px;letter-spacing:.06em;color:var(--ink);
    background:var(--flame);padding:12px 34px;border:0;border-radius:5px;
    box-shadow:0 6px 0 #7a2d06, 0 10px 22px #0007;transition:transform .08s, box-shadow .08s}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #7a2d06}
  .end .title{font-size:clamp(40px,calc(var(--u,6.4px)*12),120px)}
  .end.win .title{color:var(--herb);text-shadow:0 6px 0 #000a,0 0 44px #8fc86655}
  .end.lose .title{color:var(--tomato);text-shadow:0 6px 0 #000a,0 0 44px #ff3b3055}
  .stat{margin-top:16px;font-size:14px;color:#d9c4a0;letter-spacing:.06em}
  .stat b{color:var(--cream)}

  /* controls sheet */
  #ctrls{margin:22px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;
    max-width:520px;text-align:left;font-size:12.5px;color:#cbb28c}
  #ctrls .r{display:flex;justify-content:space-between;gap:12px;
    border-bottom:1px dotted #ffffff1a;padding:4px 0}
  #ctrls .r b{color:var(--cream);font-weight:500}
  #ctrls .pad{color:var(--steel)}
  @media (max-width:560px){ #ctrls{grid-template-columns:1fr} #plate{top:14px;left:14px} #cooks{top:12px;right:14px} }

  .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:11px;letter-spacing:.18em;color:#7a6647;opacity:0;transition:opacity .5s}
  .hint.on{opacity:1}
  #pause{position:fixed;inset:0;z-index:30;display:grid;place-items:center;
    background:rgba(10,7,4,.62);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .18s}
  #pause.on{opacity:1;pointer-events:auto}
  #pause .pinner{text-align:center}
  #pause .ptitle{font-family:"Anton",sans-serif;font-size:calc(var(--u)*11);letter-spacing:.06em;
    color:#f4e4c1;text-shadow:0 4px 0 #000a,0 0 30px #ff8a3a55}
  #pause .psub{margin-top:calc(var(--u)*1.5);font-size:calc(var(--u)*2.1);letter-spacing:.22em;color:#b79a6e}
  #pause .pver{margin-top:calc(var(--u)*3);font-size:calc(var(--u)*2.4);letter-spacing:.14em;color:#ff8a3a;font-family:"Anton",sans-serif}
  .mpause{position:fixed;left:50%;top:calc(var(--u)*1.2);transform:translateX(-50%);z-index:31;
    width:calc(var(--u)*7);height:calc(var(--u)*5.4);display:none;place-items:center;
    border:1px solid #6b5230;border-radius:calc(var(--u)*1.1);background:rgba(20,14,8,.5);
    color:#e8d2a6;font-size:calc(var(--u)*2.3);letter-spacing:.1em;
    pointer-events:auto;cursor:pointer;font-family:"DM Mono",monospace}
  .mpause.on{display:grid}
  .mpause:active{background:rgba(255,138,58,.35)}
  #vign{position:fixed;inset:0;pointer-events:none;z-index:9;
    box-shadow:inset 0 0 200px 40px #000000aa;opacity:.32}
  #grabui{position:absolute;left:50%;top:56%;transform:translateX(-50%);text-align:center;opacity:0;pointer-events:none;transition:opacity .08s;z-index:8}
  #grabui.on{opacity:1}
  #grabui .gmsg{font-family:"Anton",sans-serif;font-size:calc(var(--u)*5);color:#ff8a3a;
    -webkit-text-stroke:4px #140c07;paint-order:stroke fill;transform:skewX(-6deg);animation:mashpulse .28s infinite}
  @keyframes mashpulse{50%{transform:skewX(-6deg) scale(1.09)}}
  #grabui .gbarwrap{width:calc(var(--u)*42);height:calc(var(--u)*2.6);margin:calc(var(--u)*2) auto 0;
    background:#0009;border:2px solid #ff8a3a;transform:skewX(-10deg);overflow:hidden}
  #grabui #grabfill{display:block;height:100%;width:100%;transform-origin:left;transform:scaleX(0);
    background:linear-gradient(90deg,#ff8a3a,#ffe03d)}
  #dmgflash{position:fixed;inset:0;pointer-events:none;z-index:8;background:var(--tomato);opacity:0}

  /* ---------- stage: always-landscape rotation ---------- */
  html,body{background:#000;overscroll-behavior:none}
  #stage{position:fixed;top:0;left:0;overflow:hidden;transform-origin:top left;background:var(--char)}
  #app,#dmgflash,#vign,#hud,#veil,#touch,.hint{position:absolute}

  /* ---------- touch controls ---------- */
  #touch{inset:0;z-index:15;pointer-events:none;display:none;font-family:"DM Mono",monospace}
  #touch.on{display:block}
  .tzone{pointer-events:auto;touch-action:none}
  .b{pointer-events:auto;touch-action:none;border:0;background:none;color:var(--cream);
    font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  #tstick{position:absolute;left:calc(var(--u)*5);bottom:calc(var(--u)*8);
    width:calc(var(--u)*30);height:calc(var(--u)*30);border-radius:50%;
    background:radial-gradient(circle,#ffffff12,#ffffff05);border:2px solid #ffffff2e;box-shadow:inset 0 0 22px #0007}
  #tnub{position:absolute;left:50%;top:50%;width:44%;height:44%;margin:-22% 0 0 -22%;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#ffe9c8,#c77b3b);border:2px solid #ffffff88;
    box-shadow:0 4px 12px #0009;will-change:transform}
  #tface{position:absolute;right:calc(var(--u)*4);bottom:calc(var(--u)*5);
    width:calc(var(--u)*42);height:calc(var(--u)*42);display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);place-items:center;pointer-events:none}
  .bg{width:calc(var(--u)*13.5);height:calc(var(--u)*13.5);border-radius:50%;display:grid;place-items:center;
    background:#160f08cc;border:2px solid #ffffff30;box-shadow:0 5px 0 #0007,inset 0 0 12px #0006;transition:transform .05s}
  .bg .g{font-size:calc(var(--u)*6.4);line-height:1;transform:translateY(-1px)}
  .bg .lab{font-size:calc(var(--u)*3);font-weight:700;letter-spacing:.04em}
  .bg.press{transform:translateY(3px);box-shadow:0 2px 0 #0007,inset 0 0 12px #0008;filter:brightness(1.35)}
  .cross{grid-column:2;grid-row:3;border-color:#7fb2d6;color:#bfe0f5}
  .square{grid-column:1;grid-row:2;border-color:#ff6a9a;color:#ffc2d6}
  .tri{grid-column:2;grid-row:1;border-color:#8fc866;color:#cdebb4}
  .roll{grid-column:3;grid-row:2;border-color:#f4e4c1;color:#f4e4c1}
  .pill{position:absolute;right:calc(var(--u)*49);bottom:calc(var(--u)*9);
    width:calc(var(--u)*13);height:calc(var(--u)*23);border-radius:calc(var(--u)*7);
    background:#160f08cc;border:2px solid var(--copper);box-shadow:0 5px 0 #0007;
    font-size:calc(var(--u)*3.4);letter-spacing:.14em;writing-mode:vertical-rl;text-orientation:mixed;display:grid;place-items:center}
  .pill.press{transform:translateY(3px);filter:brightness(1.35)}
  .mini{width:calc(var(--u)*11);height:calc(var(--u)*11);border-radius:50%;display:grid;place-items:center;
    background:#160f08cc;border:2px solid #ffffff30;box-shadow:0 4px 0 #0007;font-size:calc(var(--u)*3);letter-spacing:.06em}
  .mini.press{transform:translateY(2px);filter:brightness(1.35)}
  #bLock{position:absolute;right:calc(var(--u)*4);top:calc(var(--u)*4)}
  #tcam{position:absolute;left:calc(var(--u)*4);top:calc(var(--u)*4);display:flex;gap:calc(var(--u)*2.5)}
</style>
</head>
<body>
<div id="stage">
<div id="app"></div>
<div id="dmgflash"></div>
<div id="vign"></div>

<div id="hud">
  <div id="plate">
    <div id="hpwrap">
      <div id="hpghost"></div><div id="hpfill"></div>
      <div id="hplabel">HEALTH</div>
    </div>
    <div id="wpnrow"><div id="wpnname">BARE HANDS</div><div id="pips"></div></div>
  </div>
  <div id="cooks"><div id="cooksN">0</div><div id="cooksL">COOKS ON THE LINE</div><div id="waveL"></div></div>
  <div id="combo"><div id="comboN">0</div><div id="comboL">HIT COMBO</div></div>
  <div id="prompt"></div>
  <div id="toast"></div>
  <div id="grabui"><div class="gmsg">MASH TO BREAK FREE!</div><div class="gbarwrap"><i id="grabfill"></i></div></div>
  <div id="words"></div>
</div>
<div class="hint" id="hint"></div>
<button id="bPause" class="mpause" aria-label="Pause">&#10073;&#10073;</button>
<div id="pause"><div class="pinner"><div class="ptitle">PAUSED</div><div class="psub">Start &middot; Esc &middot; tap to resume</div><div class="pver">MOVEMENT BUILD r1 &middot; fk-gait + idle</div></div></div>

<div id="touch">
  <div id="tstick" class="tzone"><div id="tnub"></div></div>
  <div id="tface">
    <button class="b bg square" data-b="heavy"><span class="lab">HEAVY</span></button>
    <button class="b bg tri" data-b="pickup"><span class="lab">GRAB</span></button>
    <button class="b bg roll" data-b="dodge"><span class="lab">JUMP</span></button>
    <button class="b bg cross" data-b="light"><span class="lab">HIT</span></button>
  </div>
  <button id="bGuard" class="b pill" data-hold="guard">GUARD</button>
  <button id="bLock" class="b mini" data-b="lock">LOCK</button>
  <div id="tcam">
    <button class="b mini" data-hold="camL">&#9668;</button>
    <button class="b mini" data-hold="camR">&#9658;</button>
  </div>
</div>

<div id="veil">
  <div class="card" id="card"></div>
</div>
</div><!--/stage-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
/* =========================================================================
   SHORT ORDER — a 3D kitchen beat-'em-up vertical slice.
   Free roam, soft auto-aim, weight-driven weapons that break.
   Built crowd-first; carries the "chunky flat-shaded + juice" DNA of Glass Jaw.
   The whole night is wrapped in startNight(cfg,onEnd) so a cooking-loop layer
   can feed it a config and read a result later without touching the innards.
   ========================================================================= */
const V3 = THREE.Vector3;
const TAU = Math.PI*2;
const clamp = (v,a,b)=>v<a?a:v>b?b:v;
const lerp  = (a,b,t)=>a+(b-a)*t;
const rand  = (a,b)=>a+Math.random()*(b-a);
const damp  = (cur,tgt,l,dt)=>cur+(tgt-cur)*(1-Math.exp(-l*dt));
const angLerp=(a,b,t)=>{let d=((b-a+Math.PI)%TAU)-Math.PI; if(d<-Math.PI)d+=TAU; return a+d*t;};

/* palette */
const COL = { cream:0xf4e4c1, flame:0xff6a1e, copper:0xc77b3b, steel:0x7fb2d6,
  herb:0x8fc866, tomato:0xff3b30, ink:0x2a1c10, steelmat:0xb9c4cc, dark:0x0d0906 };

/* ---------------------------------------------------------------- renderer */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;   // was 1.12 -- dimmer overall exposure for the night mood
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x140d07);
scene.fog = new THREE.Fog(0x140d07, 14, 30);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 120);
camera.position.set(0,6,9);

/* ---------------------------------------------------------- post-processing */
const DPR = Math.min(devicePixelRatio,2);
const rt = new THREE.WebGLRenderTarget(2,2,{ minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBAFormat });
const postScene = new THREE.Scene();
const postCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const POST = new THREE.ShaderMaterial({
  uniforms:{
    tDiffuse:{value:rt.texture},
    uAber:{value:0}, uZoom:{value:0}, uFlash:{value:0}, uGlitch:{value:0},
    uShock:{value:0}, uSat:{value:1}, uTime:{value:0}, uImpact:{value:0},
    uFlashCol:{value:new THREE.Color(0xffffff)},
    uImpA:{value:new THREE.Color(0xFFE03D)}, uImpB:{value:new THREE.Color(0x140c07)}
  },
  vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }',
  fragmentShader:[
  'uniform sampler2D tDiffuse;',
  'uniform float uAber,uZoom,uFlash,uGlitch,uShock,uSat,uTime,uImpact;',
  'uniform vec3 uFlashCol, uImpA, uImpB;',
  'varying vec2 vUv;',
  'float hash(float n){ return fract(sin(n)*43758.5453); }',
  'void main(){',
  '  vec2 uv=vUv; vec2 c=uv-0.5; float r=length(c); vec2 dir=c/max(r,0.0001);',
  '  if(uShock>0.001){ float d=abs(r-uShock*0.85); float w=smoothstep(0.10,0.0,d)*(1.0-uShock); uv+=dir*w*0.075; }',
  '  if(uGlitch>0.001){ float band=floor(uv.y*22.0); float n=hash(band*13.13+floor(uTime*46.0)); uv.x+=(n-0.5)*uGlitch*0.14*step(0.55,n); }',
  '  float ab=uAber*(0.18+r*1.4); vec3 sum=vec3(0.0); float tot=0.0;',
  '  for(int i=0;i<6;i++){ float t=float(i)/5.0; vec2 s=uv-c*uZoom*t; float w=1.0-t*0.55;',
  '    sum.r+=texture2D(tDiffuse,s+dir*ab).r*w; sum.g+=texture2D(tDiffuse,s).g*w; sum.b+=texture2D(tDiffuse,s-dir*ab).b*w; tot+=w; }',
  '  vec3 col=sum/tot;',
  '  float l=dot(col,vec3(0.299,0.587,0.114)); col=mix(vec3(l),col,uSat);',
  '  col+=uFlashCol*uFlash;',
  '  if(uImpact>0.5){ float li=dot(col,vec3(0.299,0.587,0.114)); float e=smoothstep(0.30,0.46,li); col=mix(uImpB,uImpA,step(0.5,e)); }',
  '  col*=1.0-0.05*step(0.5,fract(gl_FragCoord.y*0.5));',
  '  col*=smoothstep(1.12,0.30,r);',
  '  gl_FragColor=vec4(col,1.0);',
  '}'].join('\n')
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), POST));

/* ---- real flame: a procedural fbm-fire billboard (texture-free) ----
   One shared ShaderMaterial for every torch flame. The VERTEX shader turns each
   quad into a screen-facing billboard (works even parented to the swinging hand),
   so nothing needs per-frame JS orientation -- we just tick uTime. The FRAGMENT
   shader is the classic GPU fire: fbm value-noise scrolled upward, masked into a
   teardrop, run through a red->orange->yellow->white color ramp, additive.
   Core colors are HDR (>1) so they survive the ACES tone-map and read as fire. */
const FLAME_MAT = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0} },
  transparent:true, depthWrite:false, depthTest:true, blending:THREE.AdditiveBlending,
  vertexShader:[
    'uniform float uTime; varying vec2 vUv; varying float vSeed;',
    'void main(){',
    '  vUv=uv;',
    '  vSeed = modelMatrix[3].x*0.37 + modelMatrix[3].z*0.53;',     // per-torch phase from world pos
    '  vec4 c = modelViewMatrix * vec4(0.0,0.0,0.0,1.0);',          // quad centre in view space
    '  gl_Position = projectionMatrix * vec4(c.xy + position.xy, c.z, 1.0);',   // offset by local size -> screen-facing
    '}'].join('\n'),
  fragmentShader:[
    'uniform float uTime; varying vec2 vUv; varying float vSeed;',
    'float hash(vec2 p){ return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5453); }',
    'float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);',
    '  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));',
    '  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y); }',
    'float fbm(vec2 p){ float s=0.0,a=0.5; for(int i=0;i<4;i++){ s+=a*vnoise(p); p*=2.02; a*=0.5; } return s; }',
    'void main(){',
    '  vec2 uv=vUv;',
    '  float t = uTime*1.7 + vSeed*7.0;',
    '  float taper = smoothstep(0.0,0.14,uv.y) * smoothstep(1.0,0.34,uv.y);',   // fade in at base, out at tip
    '  float width = 0.42 + 0.5*(1.0-uv.y);',                                    // wider at the base
    '  float dx = abs(uv.x-0.5)/(0.5*width);',
    '  float shape = taper*(1.0 - dx*dx);',
    '  float n = fbm(vec2(uv.x*3.0 + vSeed, uv.y*2.4 - t));',                    // upward-scrolling turbulence
    '  float flame = clamp(shape + (n-0.5)*0.62*taper, 0.0, 1.0);',
    '  float body = smoothstep(0.34,0.72,flame);',

/* wood plank floor with seam lines (arena.js used a GridHelper; a canvas

function plankTex(){
  const c=document.createElement('canvas'); c.width=c.height=256; const g=c.getContext('2d');

  g.globalAlpha=1; g.strokeStyle='#00000040'; g.lineWidth=1;
  for(let y=0;y<=256;y+=16){ g.beginPath(); g.moveTo(0,y); g.lineTo(256,y); g.stroke(); }
  for(let y=0;y<256;y+=16){ for(let x=0;x<256;x+=48){ const off=(y/16)%2?24:0;

  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(6,4.5);
  t.anisotropy=4; return t;
}
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ARENA.w,ARENA.d),

floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; arena.add(floor);

const WIN_W=8.6, WIN_H=4.0, WIN_PANES=4;

const WINDOWS=[

// rooftop deck on the bay at dusk -- a colonnade of posts, a low parapet edge,

const postMat=new THREE.MeshStandardMaterial({color:0x4a3320,roughness:.85,flatShading:true});

const sidePosts=[-HALFD,-WZS-WHW,-WZS+WHW,WZS-WHW,WZS+WHW,HALFD];

terraceEdge('x',  HALFD, ARENA.w, backPosts);

/* ============================================================ LOCALE VIEWS

function lgrad(lx,x0,y0,x1,y1,stops){ const g=lx.createLinearGradient(x0,y0,x1,y1); for(const st of stops) g.addColorStop(st[0],st[1]); return g; }

  lx.fillStyle='#9adcd2'; lx.beginPath(); lx.arc(44*SX,12*SY,3*SX,0,6.283); lx.fill();

}
function locOcean(lx,x,y,w,h,t){

function locCity(lx,x,y,w,h,t){

function locUnderwater(lx,x,y,w,h,t){

    lx.beginPath(); lx.moveTo(bx2,y); lx.lineTo(bx2+8,y); lx.lineTo(bx2+16,y+h); lx.lineTo(bx2+4,y+h); lx.closePath(); lx.fill(); }

function locWarp(lx,x,y,w,h,t){

/* ---- THE OCEAN AS A REAL 3D WORLD OUTSIDE --------------------------------
   The restaurant sits on a bay at dusk. Rather than paint each window with a
   flat canvas slice (which read as billboards), we build ONE ocean world OUTSIDE
   the walls -- sky dome, sea, sun, island, a drifting boat, and palms right
   outside the glass -- all at real distance. The walls now have real openings
   (see apertureWall above), so the actual camera sees this world THROUGH the
   windows and the parallax is genuine: the near palms sweep fast as you move,
   the sea drifts mid-slow, the sun and horizon barely shift. No per-window
   canvas, no azimuth slicing -- real geometry does all of it for free.
   Everything is unlit (MeshBasic) + fog:false, like the old window textures, so
   the room's 14-30 fog and key light don't wash out the distant view. */
const AZ_SUN=Math.PI;                        // the sunset is out the back wall
// bearing -> world direction (b=0 -> +Z front, PI -> -Z back, +-PI/2 -> +-X sides)
function bearingDir(b){ return {x:Math.sin(b), z:Math.cos(b)}; }
const winFrameMat=new THREE.MeshStandardMaterial({color:0x5a3f28,roughness:.8,flatShading:true});
const wellDark=new THREE.MeshStandardMaterial({color:0x0d0906,roughness:1,flatShading:true});
const OCEAN={};                              // animated refs (sea shimmer, boat)

function skyDomeTex(){
  // dusk gradient down the sphere: cool zenith -> warm sunset band at the
  // horizon (v~0.5) -> warm below (hidden under the sea). Canvas top = zenith.
  const c=document.createElement('canvas'); c.width=8; c.height=256; const g=c.getContext('2d');
  g.fillStyle=lgrad(g,0,0,0,256,[[0,'#141a46'],[0.32,'#2c2a5c'],[0.46,'#7a4a63'],[0.5,'#c8683f'],[0.56,'#ffb45a'],[0.7,'#8a4a40'],[1,'#3a2540']]);
  g.fillRect(0,0,8,256);
  const t=new THREE.CanvasTexture(c); t.minFilter=THREE.LinearFilter; return t;
}
function seaTex(){
  // dusk water: darker to the front, a warm band + glitter column toward the
  // sun (top of the canvas = the -Z / sunset side of the plane).
  const c=document.createElement('canvas'); c.width=256; c.height=256; const g=c.getContext('2d');
  g.fillStyle=lgrad(g,0,0,0,256,[[0,'#3a2f52'],[0.5,'#26244a'],[1,'#141830']]);
  g.fillRect(0,0,256,256);
  g.fillStyle='#c8683f'; g.globalAlpha=0.22; g.fillRect(0,0,256,52); g.globalAlpha=1;   // warm reflection toward the sun
  for(let i=0;i<60;i++){                                            // sun glitter column near x-centre, sun side
    const gx=128+(Math.random()-0.5)*44, gy=Math.random()*120, w=2+Math.random()*7;
    g.fillStyle='rgba(255,214,150,'+(0.05+Math.random()*0.22).toFixed(3)+')'; g.fillRect(gx-w/2,gy,w,1);
  }
  for(let i=0;i<240;i++){                                           // scattered wave flecks
    const wx=Math.random()*256, wy=Math.random()*256, w=3+Math.random()*8;
    g.fillStyle='rgba(150,160,200,'+(0.03+Math.random()*0.06).toFixed(3)+')'; g.fillRect(wx,wy,w,1);
  }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(6,6);
  t.minFilter=THREE.LinearFilter; return t;
}
function palmSilhouette(x,z,ry,scale){
  // a dark dusk palm just OUTSIDE the glass -- the near-parallax cue that sells
  // the depth (it swings across the window as the camera moves)
  const g=new THREE.Group(); g.position.set(x,0,z); g.rotation.y=ry; g.scale.setScalar(scale||1); arena.add(g);
  const dark=new THREE.MeshBasicMaterial({color:0x0a1622, fog:false});
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.2,4.4,7),dark); trunk.position.set(0,2.2,0); trunk.rotation.z=0.16; g.add(trunk);
  for(let i=0;i<7;i++){ const fr=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.12,0.5),dark);
    fr.position.set(0.3,4.3,0); fr.rotation.z=0.5-i*(Math.PI/6); fr.rotation.y=i*0.9; g.add(fr); }
  return g;
}
function buildOcean(){
  // --- sky dome (far, barely parallaxes -- correct for sky) ---
  const dome=new THREE.Mesh(new THREE.SphereGeometry(90,32,18),
    new THREE.MeshBasicMaterial({map:skyDomeTex(), side:THREE.BackSide, fog:false, depthWrite:false}));
  dome.position.set(0,1.6,0); dome.renderOrder=-10; arena.add(dome);

  // --- sea (mid: a big plane out to the horizon, texture drifts) ---
  const stex=seaTex(); OCEAN.sea=stex;
  const sea=new THREE.Mesh(new THREE.PlaneGeometry(320,320),
    new THREE.MeshBasicMaterial({map:stex, fog:false}));
  sea.rotation.x=-Math.PI/2; sea.position.set(0,-1.9,0); sea.renderOrder=-8; arena.add(sea);   // below the deck -- you look out and slightly DOWN over the water past the railing

  // --- the setting sun + glow, out the back on the horizon ---
  const sd=bearingDir(AZ_SUN), sunD=86, sunPos=[sd.x*sunD, 5.5, sd.z*sunD];
  const glow=new THREE.Mesh(new THREE.CircleGeometry(9,24),
    new THREE.MeshBasicMaterial({color:0xffb45a, fog:false, transparent:true, opacity:0.35}));
  const sun=new THREE.Mesh(new THREE.CircleGeometry(3.4,24),
    new THREE.MeshBasicMaterial({color:0xfff2cf, fog:false}));
  for(const m of [glow,sun]){ m.position.set(sunPos[0],sunPos[1],sunPos[2]); m.lookAt(0,sunPos[1],0); m.renderOrder=-9; arena.add(m); }

  // --- distant island silhouette, off to the sun side ---
  const id=bearingDir(AZ_SUN-0.45), isleD=58;
  const isle=new THREE.Group(); isle.position.set(id.x*isleD, 0, id.z*isleD); arena.add(isle);
  const islMat=new THREE.MeshBasicMaterial({color:0x121a30, fog:false});
  for(const [ox,w,h] of [[-6,10,2.4],[2,14,3.6],[10,8,1.9]]){
    const hump=new THREE.Mesh(new THREE.CylinderGeometry(0.1,w*0.5,h,5), islMat);
    hump.position.set(ox,h*0.5-0.3,0); isle.add(hump);
  }

  // --- a boat drifting across the bay (animated) ---
  const bd=bearingDir(AZ_SUN), boatD=34;
  const boat=new THREE.Group(); boat.position.set(0,-0.4,bd.z*boatD); arena.add(boat); OCEAN.boat=boat; OCEAN.boatD=boatD;
  const bMat=new THREE.MeshBasicMaterial({color:0x0a1020, fog:false});
  const hull=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.5,0.7),bMat); boat.add(hull);
  const sail=new THREE.Mesh(new THREE.BoxGeometry(0.08,1.6,0.5),bMat); sail.position.set(0,1.0,0); boat.add(sail);

  // --- near palms just OUTSIDE each window (strong parallax framing) ---
  for(const win of WINDOWS){
    const o=bearingDir((win.ry+Math.PI));            // outward normal of this window
    const px=win.x + o.x*2.8 + o.z*2.4, pz=win.z + o.z*2.8 - o.x*2.4;   // outside + to one side
    palmSilhouette(px, pz, win.ry+0.3, 0.9);
  }
}
buildOcean();

// and looked stubby. Longer legs bend at the knee when standing and give real
// stride room, so the gait below can take actual steps.
const THIGH=0.52, SHIN=0.52, ARM_U=0.40, ARM_F=0.40;

// was well BELOW the leg length (THIGH+SHIN=1.04), which geometrically forced a
// permanent ~90deg knee bend (a half-squat) -- no leg was ever straight. Raised
// toward the leg length so the legs stand much closer to straight. TRADEOFF: a
// higher hip has less diagonal ground-reach per step (shorter strides), so this is
// a balance, not a max -- truly straight standing AND big run strides at once needs
// dynamic hip height / a flight phase (a follow-up). Tune by eye.
const LEG_HIP_Y=0.97;

// foot at leg length PEND_R, so the stance leg straightens at mid-stance and the
// pelvis rises/falls -- straight standing legs AND full strides at once (the pelvis
// dips at double support, where the legs spread widest). PEND_R is the effective
// near-straight leg length; raise toward THIGH+SHIN (1.04) for straighter, taller
// standing (watch the reach clamp ~1.008). FOOT_Y = planted-foot IK height. Tune by eye.

const _tb=new V3(),_dirN=new V3(),_bnd=new V3(),_jnt=new V3(),_om=new V3(),_kt=new V3(),_knee=new V3();
function orientBone(mesh,a,b){
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  _om.subVectors(b,a); const len=Math.max(_om.length(),0.01);
  mesh.scale.set(1,len,1); mesh.quaternion.setFromUnitVectors(UP,_om.normalize());
}
/* length-LOCKED bone: always exactly `L` long, anchored at a, pointing at b.
   a bone can never stretch — if the target's out of reach the limb falls short. */
function orientFixed(mesh,a,b,L){
  _om.subVectors(b,a); const d=_om.length(); if(d<1e-5) _om.set(0,-1,0); else _om.divideScalar(d);
  mesh.position.copy(a).addScaledVector(_om, L*0.5);
  mesh.scale.set(1, L, 1); mesh.quaternion.setFromUnitVectors(UP, _om);
}
function solveTwoBone(b1,b2,root,tip,L1,L2,bendDir,outJoint){
  _tb.subVectors(tip,root); let d=_tb.length(); if(d<1e-4){ _tb.set(0,-1,0); d=1e-4; }
  _dirN.copy(_tb).divideScalar(d);
  if(d>=L1+L2){ _jnt.copy(root).addScaledVector(_dirN, d*(L1/(L1+L2))); }
  else{
    _bnd.copy(bendDir); _bnd.addScaledVector(_dirN,-_bnd.dot(_dirN));
    if(_bnd.lengthSq()<1e-5){ _bnd.set(0,-1,0).addScaledVector(_dirN,_dirN.y); }
    _bnd.normalize();
    const a=(L1*L1-L2*L2+d*d)/(2*d); const h=Math.sqrt(Math.max(0,L1*L1-a*a));
    _jnt.copy(root).addScaledVector(_dirN,a).addScaledVector(_bnd,h);
  }
  // lock the knee to exactly L1 from the root along the bend direction, then
  // draw both bones at fixed length — reachable poses are unchanged, over-reach
  // just leaves the foot short instead of stretching the leg.
  _kt.subVectors(_jnt,root); const kl=_kt.length(); if(kl>1e-5) _kt.divideScalar(kl); else _kt.set(0,-1,0);
  _knee.copy(root).addScaledVector(_kt, L1);
  orientFixed(b1, root, _knee, L1);
  orientFixed(b2, _knee, tip, L2);
  if(outJoint) outJoint.copy(_knee);
}

function toGround(a,lx,lz,out){ const c=Math.cos(a.facing),s=Math.sin(a.facing);
  out.set(a.pos.x+lx*c+lz*s, 0, a.pos.z - lx*s + lz*c); return out; }
function toRootLocal(a,w,out){ const dx=w.x-a.pos.x, dz=w.z-a.pos.z, c=Math.cos(a.facing), s=Math.sin(a.facing);
  out.set(dx*c - dz*s, w.y, dx*s + dz*c); return out; }

/* ---- squish: flesh dents on contact via an injected vertex-shader push ---- */
const SQUISH={ headMax:0.14, radius:0.30, stiff:380, damp:9, rebound:0.70 };
function dentify(mat, radius){
  const u={ uDentP:{value:new V3(0,99,0)}, uDentN:{value:new V3(0,0,1)}, uDentA:{value:0}, uDentR:{value:radius||SQUISH.radius} };
  mat.userData.u=u;
  mat.onBeforeCompile=function(sh){
    sh.uniforms.uDentP=u.uDentP; sh.uniforms.uDentN=u.uDentN; sh.uniforms.uDentA=u.uDentA; sh.uniforms.uDentR=u.uDentR;
    sh.vertexShader='uniform vec3 uDentP; uniform vec3 uDentN; uniform float uDentA; uniform float uDentR;\n'
      + sh.vertexShader.replace('#include <begin_vertex>',
        '#include <begin_vertex>\nfloat dD=distance(transformed,uDentP);\nfloat dW=smoothstep(uDentR,0.0,dD);\ndW=dW*dW*(3.0-2.0*dW);\ntransformed+=uDentN*(uDentA*dW);\n');
  };
  mat.customProgramCacheKey=function(){ return 'dent'; };
  return mat;
}
function deform(max){ return { a:0, v:0, t:0, max:max, p:new V3(0,99,0), n:new V3(0,0,1) }; }
const _lp=new V3();
function springDeform(d, raw){
  d.v += ((d.t-d.a)*SQUISH.stiff - d.v*SQUISH.damp)*raw;
  d.a += d.v*raw;
  d.a = clamp(d.a, -d.max*SQUISH.rebound, d.max);
  d.t = 0;
}
function applyDeform(mesh, d, scale){
  const u=mesh.material.userData.u; if(!u) return;
  u.uDentA.value = d.a/(scale||1); u.uDentP.value.copy(d.p); u.uDentN.value.copy(d.n);
}

function makeChef(o){
  const skin=M(o.skin,.7), apronMat=M(o.apron,.6), toqueMat=M(0xf7f2e8,.85), bootMat=M(o.boot||0x241a12,.6);

  const body=new THREE.Group(); root.add(body);       // bob/lean/squash lives here
  const WAIST=1.06;
  const spine=new THREE.Group(); spine.position.y=WAIST; body.add(spine);   // waist joint — upper body flexes here
  const upper=new THREE.Group(); upper.position.y=-WAIST; spine.add(upper);  // offset back so children keep their coords; twists for gait & swings

  const hips=new THREE.Mesh(new THREE.CylinderGeometry(0.30,0.32,0.34,8),apronMat);
  hips.position.y=0.82; hips.castShadow=true; body.add(hips);
  const jacketMat=M(o.jacket||0xece5d6,.72);
  const cos=[];   // fiddly bits hidden during a ragdoll death

  // Torso: her actual body model (preview/chef.js), not Short Order's generic
  // cylinders -- split at the same two points Short Order's own code needs to
  // grab independently: `abMesh` (body-level; abMesh.rotation.x drives the
  // waist-bend animation) and `torso` (upper-level; the ragdoll's chest bone,
  // directly re-oriented via orientBone(u.torso, hipMid, shMid)). Both must
  // stay individually-addressable objects for those to keep working -- so
  // everything above the waist (her core body, shoulder caps, neck, collar,
  // waist tie) is grouped as `torso`; her wrap-around apron alone is `abMesh`.
  // Non-`o.locs` callers (enemies) keep Short Order's original plain
  // cylinders -- this is her look specifically, not a general redesign.
  // Dimensions are fitted to Short Order's own torso "envelope" (its original
  // radii/heights, below in the else branch) rather than her chef.js numbers
  // scaled by one blanket factor -- a first attempt at a uniform 1.35x scale
  // rendered badly (oversized, floating shoulder caps; an apron cylinder tall
  // enough to overlap the chest), caught by actually looking, not assumed.
  let abMesh, torso;
  if(o.locs){
    abMesh=new THREE.Group();
    const apronBody=new THREE.Mesh(new THREE.CylinderGeometry(0.33,0.36,0.5,12),apronMat);
    apronBody.scale.z=0.78; apronBody.castShadow=true; abMesh.add(apronBody);
    abMesh.position.y=0.95; body.add(abMesh);

    torso=new THREE.Group();
    const core=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.28,0.58,12),jacketMat);
    core.scale.z=0.8; core.castShadow=true; torso.add(core);
    for(const sx of [-1,1]){
      const cap=new THREE.Mesh(new THREE.SphereGeometry(0.12,10,8),jacketMat);
      cap.scale.set(1,0.85,0.9); cap.position.set(sx*0.34,0.24,0); cap.castShadow=true; torso.add(cap);
    }
    const tie=new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.36,0.06,12),M(0x6f4626,.7));
    tie.scale.z=0.78; tie.position.y=-0.22; tie.castShadow=true; torso.add(tie);
    const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.12,0.14,10),skin);
    neck.position.set(0,0.34,0.02); neck.castShadow=true; torso.add(neck);
    const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.19,0.21,0.1,12),jacketMat);
    collar.position.set(0,0.27,0.02); collar.castShadow=true; torso.add(collar);
    torso.position.y=1.44; upper.add(torso);
  } else {
    abMesh=new THREE.Mesh(new THREE.CylinderGeometry(0.315,0.335,0.46,10), jacketMat);
    abMesh.position.y=0.99; abMesh.castShadow=true; body.add(abMesh);
    torso=new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.30,0.62,10), jacketMat);
    torso.position.y=1.44; torso.castShadow=true; upper.add(torso);
    // double-breasted jacket buttons + a flat apron patch -- her look has a
    // real wrap-around apron (above) instead, so these are enemy-only now.
    for(let i=0;i<3;i++){ for(const sx of [-1,1]){ const b=new THREE.Mesh(new THREE.SphereGeometry(0.028,6,5),M(0x2a2a2a,.6));
      b.position.set(sx*0.09,1.16+i*0.16,0.34); upper.add(b); cos.push(b);} }
    const apronPatch=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.7,0.06),apronMat);
    apronPatch.position.set(0,1.14,0.33); apronPatch.castShadow=true; upper.add(apronPatch); cos.push(apronPatch);
  }
  cos.push(abMesh);
  let scarf=null;
  if(o.scarf){
    scarf=new THREE.Mesh(new THREE.TorusGeometry(0.2,0.06,6,14,Math.PI*1.2),M(o.scarf,.6));
    scarf.rotation.x=Math.PI/2; scarf.rotation.z=Math.PI*0.4; scarf.position.set(0,1.6,0.14); upper.add(scarf); cos.push(scarf);
  }

  const head=new THREE.Mesh(new THREE.SphereGeometry(0.235,18,14), dentify(skin.clone()));
  head.position.set(0,1.86,0.02); head.castShadow=true; upper.add(head);
  const brow=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.06,0.08),M(0x1a120a,.9)); brow.position.set(0,1.9,0.22); upper.add(brow); cos.push(brow);
  for(const sx of [-1,1]){ const eye=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,6),M(0x120a06,.5));
    eye.position.set(sx*0.09,1.86,0.22); upper.add(eye); cos.push(eye); }
  // headwear: the player's a chef (toque); enemies are customers (hair, no hat).
  // A child of `head` itself, not `upper` -- the hat/hair never comes off,
  // so it has no business being a second, independently-tracked object that
  // can drift out of sync with the head. That was the actual "hat sliding
  // off" bug: toque used to live under `upper` with its own position that a
  // couple of other places had to remember to re-sync by hand (ragdoll,
  // reset) -- miss a spot and it visibly separates. As a head child it just
  // inherits head's position for free, the same way the dreadlocks below
  // already did (they never had this bug). `toque.rotation.x/z`, set
  // elsewhere for the little spring "hat bobble", still works exactly the
  // same -- it's layered ON TOP of head's own motion now instead of being
  // computed independently of it, which is the actually-correct version of
  // that effect anyway.
  const toque=new THREE.Group();
  if(o.customer){
    const hairMat=M(o.hair||0x2a1c12,.92);
    const hair=new THREE.Mesh(new THREE.SphereGeometry(0.245,12,9,0,TAU,0,Math.PI*0.6),hairMat);
    hair.scale.set(1.02,0.92,1.05); toque.add(hair);
    toque.position.set(0,0.04,-0.02);
  } else if(o.male){
    // MALE chef (the "male swap") -- his established look ported from
    // culinary-dash-3d/src/preview/chef.js: deep-teal top (via o.jacket), a big
    // round AFRO built from a domed puff cluster, with a toque perched ON the hair.
    const hairMat=M(0x17110d,.9);
    const afro=(r,x,y,z)=>{ const m=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),hairMat); m.position.set(x,y,z); m.castShadow=true; head.add(m); };
    afro(0.31,0,0.12,-0.04);                                     // main dome
    afro(0.2,-0.24,0.06,-0.02); afro(0.2,0.24,0.06,-0.02);       // side volume over the ears
    afro(0.19,0,0.32,-0.03);                                     // crown
    afro(0.19,-0.16,0.26,0.05); afro(0.19,0.16,0.26,0.05);       // upper-front bumps
    afro(0.18,-0.18,0.24,-0.18); afro(0.18,0.18,0.24,-0.18);     // upper-back bumps
    afro(0.19,0,0.1,-0.2);                                       // back volume
    afro(0.15,-0.18,-0.06,0.02); afro(0.15,0.18,-0.06,0.02);     // cheek framing
    const band=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.25,0.2,12),toqueMat); band.position.set(0,0.5,-0.03); toque.add(band);   // toque perched on the afro
    const puff=new THREE.Mesh(new THREE.SphereGeometry(0.28,12,9),toqueMat); puff.position.set(0,0.64,-0.03); puff.scale.y=0.9; toque.add(puff);
    toque.position.set(0,0.06,0);
  } else {
    // the cuff -- the snug band the hat actually sits on -- sized to CAP
    // OVER the dreadlocks (radius well past LR=0.24, the locs' own ring
    // radius, so their outward flare can't poke past it) instead of
    // stopping at barely the head's own size and getting swallowed by the
    // hair sitting outside it. A cuff has to be bigger than the head+hair
    // it wraps, same as a real hatband would be.
    const cuff=new THREE.Mesh(new THREE.CylinderGeometry(0.32,0.32,0.18,14),toqueMat); toque.add(cuff);
    const cuffLip=new THREE.Mesh(new THREE.CylinderGeometry(0.345,0.345,0.04,14),toqueMat); cuffLip.position.y=-0.09; toque.add(cuffLip);
    const puff=new THREE.Mesh(new THREE.SphereGeometry(0.29,14,10),toqueMat); puff.position.y=0.20; puff.scale.y=1.15; toque.add(puff);
    toque.position.set(0,0.06,0);
  }
  toque.children.forEach(c=>c.castShadow=true); head.add(toque);
  // her dreadlocks, worn under the toque (chez-samoa-3D's default chef look --
  // ported from culinary-dash-3d/src/preview/chef.js's loc-ring generator).
  // Rings of thin cylinders flaring down-and-back from under the hat brim,
  // deterministic wobble via a sine jitter, face left open (FRONT_GAP).
  // Parented to `head` itself (in head-local coordinates, not upper's) so
  // they follow it correctly when the ragdoll writes head.position directly
  // (buildRagdoll/resetRagPose) -- NOT pushed into `cos` (which the ragdoll
  // hides), since hair should stay visible falling with the head, not vanish.
  // Four rings, not three -- the added top one (phi:1.15) reaches up far
  // enough to meet the cuff above with no gap of bare scalp between them.
  if(o.locs){
    const locMat=M(0x17110d,.9);
    const LR=0.24, FRONT_GAP=0.95;
    const locRings=[{phi:1.15,n:14,len:0.30},{phi:1.30,n:16,len:0.40},{phi:1.44,n:20,len:0.52},{phi:1.58,n:22,len:0.62}];
    for(const ring of locRings){
      const hr=LR*Math.sin(ring.phi), ry=LR*Math.cos(ring.phi);
      for(let i=0;i<ring.n;i++){
        const th=(i/ring.n)*TAU;
        const rx=hr*Math.sin(th), rz=hr*Math.cos(th);
        if(Math.abs(Math.atan2(rx,rz))<FRONT_GAP) continue;
        const jit=Math.sin(i*12.9+ring.phi*78.2);
        const len=ring.len*(0.9+0.16*(jit*0.5+0.5));
        const root=new V3(rx, ry+0.02, rz-0.02);
        const dir=new V3(rx*0.4,0,rz*1.6-0.1).normalize()
          .multiplyScalar(0.62+0.12*jit).add(new V3(0,-1,0)).normalize();
        const loc=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.033,len,5),locMat);
        loc.castShadow=true;
        loc.quaternion.setFromUnitVectors(UP,dir);
        loc.position.copy(root).add(dir.clone().multiplyScalar(len/2));
        head.add(loc);
      }
    }
  }

  // arms: IK bones under `upper` so the shoulder rides the torso twist.
  // each hand is a world-target the arm reaches for (guard pose / punch / swing).
  // Upper arm wears a sleeve (jacket-colored); forearm is bare skin -- matches
  // her actual look (preview/chef.js's arm(): pink sleeve, bare brown forearm)
  // rather than the original all-skin bone.
  const arms=[];
  for(let i=0;i<2;i++){
    const uArm=boneIK(0.10,0.088,jacketMat), fArm=boneIK(0.09,0.078,skin);
    const hand=new THREE.Group();
    const fist=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,8),skin); fist.castShadow=true; hand.add(fist);
    upper.add(uArm); upper.add(fArm); upper.add(hand);
    arms.push({ up:uArm, fore:fArm, hand, fist,
      sh:new V3((i===0?-0.4:0.4),1.54,0),
      tgt:new V3((i===0?-0.32:0.34),1.34,0.36), elb:new V3() });
  }
  const armL=arms[0], armR=arms[1];
  // legs: IK bones under `root`; feet plant in world space (footwork)
  const legs=[];
  for(let i=0;i<2;i++){
    const th=boneIK(0.13,0.1,apronMat), sh=boneIK(0.1,0.085,skin);
    const boot=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.1,0.3),bootMat); boot.castShadow=true;
    root.add(th); root.add(sh); root.add(boot);
    legs.push({ thigh:th, shin:sh, boot,
      hip:new V3((i===0?-0.16:0.16),LEG_HIP_Y,0), knee:new V3(),
      world:new V3(), from:new V3(), to:new V3(), stepT:1, lift:0 });
  }

  root.userData = {
    body, spine, upper, torso, abMesh, head, hips, toque, arms, legs, armL, armR, cos,
    dHead: deform(SQUISH.headMax),
    mats:{ skin, jacket:jacketMat, apron:apronMat, scarf:scarf?scarf.material:null },
    weaponGroup:null, weaponKey:'fists',
    whand: o.male?0:1, grip: o.male?'reverse':'forward',   // handedness + knife grip (male chef = left / icepick)
    rest:{ torso:{p:torso.position.clone(),q:torso.quaternion.clone(),s:torso.scale.clone()},
           head:head.position.clone(), hips:hips.position.clone() }
  };
  scene.add(root);
  return root;
}
/* restore the standing pose after a ragdoll (the ragdoll leaves torso/head/hips posed) */
function resetRagPose(a){
  const u=a.chef.userData, R=u.rest; if(!R) return;
  a.rag=null;
  u.torso.position.copy(R.torso.p); u.torso.quaternion.copy(R.torso.q); u.torso.scale.copy(R.torso.s);
  u.head.position.copy(R.head); u.head.rotation.set(0,0,0);
  u.hips.position.copy(R.hips); u.hips.rotation.set(0,0,0);
  // toque no longer needs a position restore -- it's a fixed child of head now
  u.toque.rotation.set(0,0,0);
  u.spine.rotation.set(0,0,0); u.upper.rotation.set(0,0,0); u.abMesh.rotation.set(0,0,0);
  u.body.position.set(0,0,0); u.body.rotation.set(0,0,0); u.body.scale.set(1,1,1);
  a.chef.scale.setScalar(a.kind==='tough'?1.12:1);
  u.dHead.a=0; u.dHead.v=0; u.dHead.t=0;
  for(const m of u.cos) m.visible=true;
}
/* give a chef a weapon in the right hand */
function equip(chef, key){
  const u=chef.userData;
  const wh=u.arms[u.whand==null?1:u.whand].hand;    // weapon hand (right by default, left for the male chef)
  if(u.weaponGroup && u.weaponGroup.parent){ u.weaponGroup.parent.remove(u.weaponGroup); }
  const g=makeWeaponMesh(key);
  g.position.set(0.02,0,0.04); g.rotation.x=0.15;   // slight grip tilt; hand orients along the forearm
  wh.add(g); u.weaponGroup=g; u.weaponKey=key;
}

/* ================================================================ AUDIO */
let AC=null, master=null;
function audioInit(){ if(AC)return; const A=window.AudioContext||window.webkitAudioContext; if(!A)return;
  AC=new A(); master=AC.createGain(); master.gain.value=0.5; master.connect(AC.destination); kitchenInit(); }

/* ---- room tone: pink noise (a kitchen breathes), lowpass vent murmur + a
   bandpass "sizzle" band that opens up when the action does (à la Glass Jaw) ---- */
const ROOM={ on:false, level:0, spike:0, murmurG:null, sizzleG:null, sizzleF:null };
function pinkBuffer(seconds){
  const sr=AC.sampleRate, n=(sr*seconds)|0, buf=AC.createBuffer(2,n,sr);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<n;i++){ const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
      b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      const pink=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
      const t=i/sr, ph=ch*1.7, wob=0.72+0.28*Math.sin(t*0.5+ph)*Math.sin(t*0.19+ph*0.5);
      d[i]=pink*wob; } }
  return buf;
}
function kitchenInit(){ if(!AC||ROOM.on)return;
  const buf=pinkBuffer(6);
  const layer=(type,freq,q,gain)=>{ const s=AC.createBufferSource(); s.buffer=buf; s.loop=true;
    const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=freq; if(q)f.Q.value=q;
    const g=AC.createGain(); g.gain.value=gain; s.connect(f).connect(g).connect(master);
    s.start(Math.random()*3); return {g,f}; };
  const murmur=layer('lowpass',480,0.7,0);
  const sizzle=layer('bandpass',2600,0.6,0);
  ROOM.murmurG=murmur.g; ROOM.sizzleG=sizzle.g; ROOM.sizzleF=sizzle.f; ROOM.on=true;
}
function kitchenBump(v){ ROOM.spike=Math.min(1.5, ROOM.spike+v); }
function kitchenTick(raw){ if(!ROOM.on)return;
  ROOM.spike=Math.max(0, ROOM.spike-raw*0.85);
  let base = GAME.mode==='play' ? 0.22 + Math.min(0.25, GAME.combo*0.02) : 0.12;
  const want=Math.min(1.4, base+ROOM.spike);
  ROOM.level += (want-ROOM.level)*Math.min(1, raw*(want>ROOM.level?6:1.6));
  const L=ROOM.level;
  ROOM.murmurG.gain.value = 0.05 + L*0.06;
  ROOM.sizzleG.gain.value = Math.max(0, L-0.25)*0.10;
  ROOM.sizzleF.frequency.value = 2200 + L*1400;   // busier kitchen gets brighter/hotter
}
/* one call site for buzz: the phone and any pad motors */
function haptic(strong, weak, ms){
  // was cut in half for mobile (ms*0.5) and passed magnitudes straight through
  // -- under-driving hardware that can take a lot more. Full duration now, and
  // both motors pushed up, so every connection actually THUMPS.
  if(navigator.vibrate){ try{ navigator.vibrate(Math.round(ms)); }catch(e){} }
  const gp=GP._pad;
  if(gp && gp.vibrationActuator){ try{
    gp.vibrationActuator.playEffect('dual-rumble',{duration:ms,strongMagnitude:Math.min(1,strong*1.25),weakMagnitude:Math.min(1,weak*1.2)});
  }catch(e){} }
}
function env(node,g,dur,a){ const t=AC.currentTime; const gg=AC.createGain(); gg.gain.setValueAtTime(0,t);
  gg.gain.linearRampToValueAtTime(g,t+(a||0.005)); gg.gain.exponentialRampToValueAtTime(0.0001,t+dur);

/* ================================================================ HELPERS */
// Props are platforms: each OBST has a `top` (surface height). collide() only
// side-blocks a prop while your feet are BELOW its top (walk into it at ground
// level); once your feet reach the top you move ONTO it, and above it you vault.
function collide(pos,r){
  pos.x=clamp(pos.x,-HALFW+r+0.3,HALFW-r-0.3);
  pos.z=clamp(pos.z,-HALFD+r+0.3,HALFD-r-0.3);
  const y=pos.y||0;
  for(const o of OBST){
    if(y >= (o.top||1.25)-0.12) continue;   // standing on / clearing this prop -> no side push
    const dx=pos.x-o.x, dz=pos.z-o.z;
    const px=(o.rx+r)-Math.abs(dx), pz=(o.rz+r)-Math.abs(dz);
    if(px>0&&pz>0){ if(px<pz){ pos.x+=(dx<0?-px:px); } else { pos.z+=(dz<0?-pz:pz); } }
  }
  // re-clamp: a prop resolution must never shove a body out THROUGH an arena wall
  pos.x=clamp(pos.x,-HALFW+r+0.3,HALFW-r-0.3);
  pos.z=clamp(pos.z,-HALFD+r+0.3,HALFD-r-0.3);
}
function within(x,z,o,r){ return Math.abs(x-o.x)<o.rx+(r||0)*0.5 && Math.abs(z-o.z)<o.rz+(r||0)*0.5; }
// the surface a body at (x,z,y) is RESTING on (feet within a hair of a prop top),
// else the floor -- used for the standing/grounded check and the airborne factor
function restY(x,z,y,r){ let s=0;
  for(const o of OBST){ const t=o.top||0; if(t>0.05 && Math.abs(y-t)<0.14 && within(x,z,o,r) && t>s) s=t; }
  return s;
}
/* HARD body-to-body collision. The enemy AI's soft "separation" steer only
   nudges intent; bodies still walked through each other and the player, which
   is exactly the wrong feel for a brawl -- you should be able to bump, wall off,
   and shove into people. This pushes every overlapping pair (player + all live
   enemies) apart to their combined radius, twice for stability. The player is
   treated as heavier (a live actor gives way more than the chef) so you feel
   solid; enemy-vs-enemy splits the push evenly. Runs after everyone has moved,
   then re-clamps to walls/props so nobody gets shoved through the bar. */
const BODY_PAD=0.14;   // extra personal space so bodies STOP with a clean gap, not interpenetrate (kept off .r so attack/grab ranges don't shift)
function bodyGive(a){                   // how much this body YIELDS to a push (lower = heavier / moves less)
  if(a.dead) return 0.06;              // a fresh corpse is near-immovable; the living pile up against it
  if(a===player) return 0.32;          // the player gives more now -- a crowd walls you off instead of letting you ghost through
  return 0.5;
}
function resolveBodies(){
  // living actors PLUS fresh corpses (still full-size, before the shrink) so you
  // can't walk through a body that just dropped in front of you
  const live=[player];
  for(const e of enemies){ if(e.state==='held' || e._overboard) continue;   // driven by the player / sailing off the deck -- don't shove
    if(!e.dead || e.deadT<1.6) live.push(e); }
  for(let iter=0; iter<4; iter++){
    for(let i=0;i<live.length;i++) for(let j=i+1;j<live.length;j++){
      const a=live[i], b=live[j];
      if(a.dead && b.dead) continue;   // two corpses don't need resolving
      if(Math.abs((a.pos.y||0)-(b.pos.y||0)) > 0.9) continue;   // one is airborne OVER the other -- jump/dive across them, don't get shoved off
      let dx=b.pos.x-a.pos.x, dz=b.pos.z-a.pos.z, d=Math.hypot(dx,dz);
      const min=(a.r||0.34)+(b.r||0.34) + BODY_PAD*2;
      if(d>=min) continue;
      if(d<1e-4){ dx=Math.cos(i*2.4+j); dz=Math.sin(i*2.4+j); d=1; }   // exact overlap: split along a stable direction
      const overlap=min-d; dx/=d; dz/=d;
      const aw=bodyGive(a), bw=bodyGive(b), s=aw+bw||1;
      a.pos.x-=dx*overlap*(aw/s); a.pos.z-=dz*overlap*(aw/s);
      b.pos.x+=dx*overlap*(bw/s); b.pos.z+=dz*overlap*(bw/s);
    }
  }
  // re-clamp only the LIVING to walls/props (don't fight the ragdoll's own transforms)
  collide(player.pos, player.r);
  for(const e of enemies) if(!e.dead) collide(e.pos, e.r);
}
function nearestEnemy(fromPos, facingYaw, cone){
  let best=null,bd=1e9;
  for(const e of enemies){ if(e.dead)continue;
    const dx=e.pos.x-fromPos.x, dz=e.pos.z-fromPos.z, d=Math.hypot(dx,dz);
    if(cone!=null){ const ang=Math.atan2(dx,dz); let da=((ang-facingYaw+Math.PI)%TAU)-Math.PI;
      if(Math.abs(da)>cone) continue; }
    if(d<bd){ bd=d; best=e; } }
  return best;
}

function startAttack(atk){ // atk shared by player/enemy: {heavy}
  const A=atk.actor, w=WEAPONS[atk.wpn];

  if(atk.heavy && w.dur!==Infinity && A.dur<2 && A.wpn!=='fists'){ /* not enough for heavy; allow but will break */ }
  const wind=w.wind*(atk.heavy?1.5:1), active=0.09, rec=w.rec*(atk.heavy?1.3:1);
  A.attack={ wpn:atk.wpn, heavy:atk.heavy, t:0, wind, active, rec, dur:wind+active+rec,

    else if(moving){
      let ax=mv.x, az=mv.z; const al=Math.hypot(ax,az);
      if(al>1e-3){ ax/=al; az/=al; } else { ax=Math.sin(P.facing); az=Math.cos(P.facing); }
      const t = rushTarget(P, ax, az) || grabTarget(P, GRAB_REACH, 1.4);
      if(t){ if(P.wpn!=='fists') dropWeapon(P); startGrabRush(P, t); }
    }
    else if(P.wpn!=='fists'){ dropWeapon(P); }
    else {
      const g=grabTarget(P, GRAB_REACH, 1.4);
      if(g){ if(g.wpn!=='fists') startWeaponSteal(P,g); else grabEnemy(P,g); }
      else if(nearPickup && Math.hypot(nearPickup.x-P.pos.x, nearPickup.z-P.pos.z)<2.0) tryPickup();
    }
  }

  // ----- attacks (Cross light / Square heavy / touch) -----
  const wantLight=pad.light||tapK('j')||MOUSE.l||consume('lightEdge'); MOUSE.l=false;
  const wantHeavy=pad.heavy||tapK('k')||MOUSE.r||consume('heavyEdge'); MOUSE.r=false;
  const airborne=P.pos.y>restY(P.pos.x,P.pos.z,P.pos.y,P.r)+0.06;   // relative to the floor OR the prop you're standing on
  if(P.hold){ /* carrying a patron: no swings -- the GRAB button throws (handled above) */ }
  else if(wantHeavy && airborne && !P.slam && !P.attack){   // an aerial swing can't be slam-cancelled
    // HEAVY in the air = OVERHEAD SLAM. Hurl yourself down; the ground-pound
    // resolves on landing (slamLand). If you're locked on (or an enemy is close),
    // the fall HOMES onto them so you land on top -- but they can block or move.
    let tgt=P.lockOn||nearestEnemy(P.pos,P.facing,null);
    const near=tgt && !tgt.dead && Math.hypot(tgt.pos.x-P.pos.x,tgt.pos.z-P.pos.z)<6.0;
    P.slam={ tgt: near?tgt:null };
    if(P.slam.tgt) P.facing=Math.atan2(P.slam.tgt.pos.x-P.pos.x, P.slam.tgt.pos.z-P.pos.z);
    P.vy=Math.min(P.vy,-5); P.attack=null; sfx.whiff();      // commit the drop
  } else if((wantLight||wantHeavy) && !P.slam && !P.dodge && !P.tackle && P.stagger<=0){
    // LIGHT in the air = a lateral aerial swing (just a normal attack while you
    // fall); on the ground, normal light/heavy. (Heavy-in-air was caught above.)
    // UNCANCELLABLE: a swing is a full commitment -- you can only start a new one
    // once the current animation has completely finished (P.attack cleared at A.dur).
    // The combo still CYCLES (chainT window below advances comboStep on the next
    // press) -- you just can't cut a swing short.
    const canStart = !P.attack;
    if(canStart){
      let tgt=P.lockOn||nearestEnemy(P.pos,P.facing,1.1)||nearestEnemy(P.pos,P.facing,null);
      if(tgt){ const dx=tgt.pos.x-P.pos.x,dz=tgt.pos.z-P.pos.z; P.attackAim=Math.atan2(dx,dz); }
      else P.attackAim=P.facing;
      P.comboStep=(P.chainT>0)?(P.comboStep+1):0;   // cycle the swing shape
      P.attack=null;                                 // clear the one we're canceling
      startAttack({ actor:P, wpn:P.wpn, heavy:wantHeavy, target:tgt, isPlayer:true });
      if(P.attack){ P.attack.aim=P.attackAim; P.chainT=P.attack.dur+0.4; }
    }
  }

  // ----- integrate attack -----
  if(P.attack){
    const A=P.attack; A.t+=dt;
    // snap facing to aim
    P.facing=angLerp(P.facing, A.aim!=null?A.aim:P.facing, Math.min(1,dt*18));
    if(!A.hit && A.t>=A.hitAt){ A.hit=true; P.facing=A.aim!=null?A.aim:P.facing;
      P.actorSync(); resolveHit(P,true); }
    if(A.t>=A.dur){ P.attack=null; }
  }

  // ----- movement integrate -----
  let spd=6.7;
  if(P.guard) spd*=0.42;
  if(P.attack) spd*=0.14;
  if(P.hold) spd*=0.85;                         // hauling someone barely slows you -- you can RUN them to the rail
  if(P.tackle){
    const T=P.tackle; T.t+=dt; const k=1-T.t/T.dur;
    if(T.rush){
      // GRAB RUSH: a committed RUN at the target -- run speed, homing so you
      // converge even if they drift. (Not the old 13 u/s rocket-lunge.)
      if(T.tgt && !T.tgt.dead){
        const hx=T.tgt.pos.x-P.pos.x, hz=T.tgt.pos.z-P.pos.z, hl=Math.hypot(hx,hz)||1;
        T.dir.set(hx/hl,0,hz/hl); P.facing=Math.atan2(T.dir.x,T.dir.z);
      }
      P.vel.x=T.dir.x*7.2; P.vel.z=T.dir.z*7.2;   // ~= run speed (spd 6.7)
    } else {
      P.vel.x=T.dir.x*13*(0.5+k*0.5); P.vel.z=T.dir.z*13*(0.5+k*0.5);   // plain tackle lunge (dead path)
    }
    if(!T.hit){                                 // reach the first person we plow into
      for(const e of enemies){ if(e.dead)continue;
        if(Math.hypot(e.pos.x-P.pos.x,e.pos.z-P.pos.z) < e.r+P.r+0.35){
          if(T.rush) rushContact(P,e); else tackleEnemy(P,e);   // rush -> grab/steal; plain tackle -> shove
          T.hit=true; break; } }
    }
    if(T.t>=T.dur) P.tackle=null;
  } else if(P.dodge){
    const D=P.dodge; D.t+=dt; const k=1-D.t/D.dur;
    P.vel.x=D.dir.x*15*k; P.vel.z=D.dir.z*15*k;   // 15 (was 11): a fast pop that clears the swing
    if(D.t>=D.dur) P.dodge=null;
  } else if(P.slam && P.slam.tgt && !P.slam.tgt.dead){
    // SLAM HOME: steer toward the target so you land on top -- speed tapers with
    // distance so you converge onto them (they can still slip out before you land)
    const dx=P.slam.tgt.pos.x-P.pos.x, dz=P.slam.tgt.pos.z-P.pos.z;
    P.vel.x=damp(P.vel.x, clamp(dx*3.4,-11,11), 8, dt);
    P.vel.z=damp(P.vel.z, clamp(dz*3.4,-11,11), 8, dt);
  } else if(P.attack && P.stagger<=0){
    // STEP INTO THE PUNCH: drive the COM forward along the strike line (plus a
    // little residual steering) so the whole body commits and follows through
    const lv=attackDrive(P), fx=Math.sin(P.facing), fz=Math.cos(P.facing);
    P.vel.x=damp(P.vel.x, fx*lv + mv.x*spd, 13, dt);
    P.vel.z=damp(P.vel.z, fz*lv + mv.z*spd, 13, dt);
  } else if(P.stagger<=0){
    const acc=airborne?3:10;                   // reduced air control -- you commit to the arc of a jump
    P.vel.x=damp(P.vel.x, mv.x*spd, acc, dt);   // ground: velocity ramps -- accel on press, slide on release
    P.vel.z=damp(P.vel.z, mv.z*spd, acc, dt);
  } else {
    P.vel.multiplyScalar(Math.exp(-6*dt));
  }
  // ----- vertical (jump / slam) -- integrate BEFORE collide so it sees the
  // height for vaulting over the props -----
  const rest=restY(P.pos.x,P.pos.z,P.pos.y,P.r);
  if(P.pos.y>rest+0.02 || P.vy!==0){
    // apex-hang: lighten gravity near the top of the arc so you FLOAT there --
    // the classic platformer trick for satisfying hang time. The slam drops with
    // committed weight but NOT so fast the overhead wind-up can't read on the way.
    const g = P.slam ? GRAV*1.7 : GRAV*(Math.abs(P.vy)<2.6 ? 0.48 : 1);   // 1.7: snappier drop, shorter overhead hold
    const prevY=P.pos.y;
    P.vy -= g*dt;
    P.pos.y += P.vy*dt;
    // land on the FLOOR, or on any prop top we crossed DOWN through this frame
    // (one-way: you can jump up past a table, then come down onto it)
    let land = P.pos.y<=0 ? 0 : -1e9;
    for(const o of OBST){ const t=o.top||0;
      if(t>0.05 && prevY>=t-0.04 && P.pos.y<=t && within(P.pos.x,P.pos.z,o,P.r) && t>land) land=t; }
    if(P.pos.y<=land){
      const landV=P.vy; P.pos.y=land; P.vy=0;
      if(P.slam){ slamLand(P, landV); P.slam=null; P.slamHit=SLAM_HIT; P.jumpCD=0.18; }  // hammer DOWN on contact
      else if(landV<-5){ shake(0.12); }         // a little thump on a hard landing
    }
  }
  P._air=clamp((P.pos.y-restY(P.pos.x,P.pos.z,P.pos.y,P.r))/1.4,0,1);
  P.pos.addScaledVector(P.vel,dt);
  collide(P.pos,P.r);

  // facing while roaming
  if(!P.attack && !P.lockOn && moving && !P.dodge && !P.tackle) P.facing=angLerp(P.facing, Math.atan2(mv.x,mv.z), Math.min(1,dt*12));
  if(P.lockOn && !P.dead){ const dx=P.lockOn.pos.x-P.pos.x,dz=P.lockOn.pos.z-P.pos.z;
    if(!P.attack) P.facing=angLerp(P.facing, Math.atan2(dx,dz), Math.min(1,dt*10)); }
  if(P.dodge) { /* keep facing */ }

  if(P.hold) updateHold(P,dt);                  // drive the held patron in front of us (after pos+facing settle)

  P.speed=Math.hypot(P.vel.x,P.vel.z);
  P.movePhase+=dt*P.speed*2.4;

  poseChef(P, true, dt);
  updateCOM(P);                                 // body centre, sampled after the pose settles
  // prompt for nearby pickup
  updatePrompt();
}

/* ================================================================ ENEMY AI */
const ATTACK_TOKENS=3; let tokensUsed=0;
function updateEnemy(e, dt){
  e._sq=damp(e._sq,0,14,dt);
  if(e.dead){ // ragdoll (or spring-topple fallback) + fade/remove
    e.deadT+=dt;
    // OVERBOARD sail: drive the whole ragdoll outward at a fixed rate PER FRAME
    // (dt-scaled, not per solver-step) so it reads at a readable pace regardless
    // of how many Verlet substeps run. Translate .p AND .o together so it's a
    // clean glide, not a velocity spike; gravity (in ragStep) still arcs it down.
    if(e._overboard && e.rag){ const d=e._overboard, s=8.5*dt;
      for(const kk in e.rag.pts){ const pt=e.rag.pts[kk]; pt.p.x+=d.x*s; pt.p.z+=d.z*s; pt.o.x+=d.x*s; pt.o.z+=d.z*s; } }
    e.chef.position.copy(e.pos); e.chef.rotation.y=e.facing;   // frame for world<->local
    if(e.deadT<1.6) updateDead(e, dt);
    if(e.deadT>1.6){ const s=clamp(1-(e.deadT-1.6)/0.7,0,1); e.chef.scale.setScalar(s*(e.kind==='tough'?1.12:1)); }
    if(e.deadT>2.3){ scene.remove(e.chef); e._remove=true; }
    return;
  }
  e.hurt=damp(e.hurt,0,8,dt);
  e.stagger=Math.max(0,e.stagger-dt);

  // HELD: the player authoritatively drives us (updateHold) -- no AI. Invariant #8:
  // if the grab was dropped without clearing us, fall back to engage.
  if(e.state==='held'){
    if((player.hold && player.hold.e===e) || (player.steal && player.steal.e===e)){ syncEnemyMesh(e,dt,e.facing); return; }
    e.state='engage'; e.stateT=0.2;
  }
  // THROWN: a freshly tossed patron slides across the floor (light drag, NOT the
  // heavy stagger decay) and BOWLS into anyone they plow into. We drive movement
  // here and return early so the stagger branch doesn't kill the momentum.
  if(e._thrown){ e._thrown.t-=dt;
    if(e._thrown.t>0){
      e.vel.multiplyScalar(Math.exp(-1.7*dt));                    // carries across the deck
      e.pos.addScaledVector(e.vel,dt); collide(e.pos,e.r);
      e.stagger=Math.max(e.stagger,0.25);
      for(const o of enemies){ if(o===e||o.dead||o._thrown||o.state==='held') continue;
        if(Math.hypot(o.pos.x-e.pos.x,o.pos.z-e.pos.z) < o.r+e.r+0.3){
          o.hp-=12; o.stagger=Math.max(o.stagger,0.7);
          const a2=e._thrown.ang; o.vel.x+=Math.sin(a2)*9; o.vel.z+=Math.cos(a2)*9;
          const cp2=o.pos.clone(); cp2.y=1.3; burst(cp2,8,0xffe03d,1.0); if(AC) sfx.thud(0.5);
          if(o.hp<=0) killChef(o,a2); else applyImpact(o,a2,1.4);
          e._thrown.t=0; break;                                   // one solid strike, then tumble to a stop
        } }
      syncEnemyMesh(e,dt,e.facing); return;
    } else e._thrown=null;
  }

  const toP=new V3(player.pos.x-e.pos.x,0,player.pos.z-e.pos.z);
  const dist=toP.length(); const dirP=toP.clone().normalize();
  let wantYaw=Math.atan2(dirP.x,dirP.z);
  e._fetching=false;

  if(e.stagger>0){
    e.vel.multiplyScalar(Math.exp(-5*dt));
    e.pos.addScaledVector(e.vel,dt); collide(e.pos,e.r);
    if(e.hasToken){ e.hasToken=false; tokensUsed--; } e.attack=null;
    if(player.grabbed && player.grabbed.by===e){ player.grabbed=null; hideMashUI(); }
    e.state='engage'; e.stateT=Math.max(e.stateT, e.stagger+0.05);   // re-engage once we shake it off
    syncEnemyMesh(e,dt,wantYaw); return;
  }

  e.stateT-=dt;
  let move=new V3();
  const reach=WEAPONS[e.wpn].reach;
  const _tang=new V3(-dirP.z,0,dirP.x);   // strafe axis (perp to player)
  if(e.state==='spawn'){ if(e.stateT<=0){
    if(e.wpn==='fists' && Math.random()<0.8){ const p=nearestFreePickup(e); if(p){ e.grabTarget=p; e.state='fetch'; } else e.state='engage'; }
    else e.state='engage';
  } }
  else if(e.state==='fetch'){                            // run for a utensil (floor OR pass)
    let p=e.grabTarget;
    if(!p || p.taken){
      // someone else grabbed the one we were running for -- go for ANOTHER free
      // weapon if we're still bare-handed, so the pass actually gets picked
      // clean. Only give up and engage unarmed once there's nothing left.
      const np = (e.wpn==='fists') ? nearestFreePickup(e) : null;
      if(np){ e.grabTarget=np; p=np; }
      else { e.grabTarget=null; e.state='engage'; e.stateT=0.2; }
    }
    if(e.state==='fetch' && p && !p.taken){
      const dx=p.x-e.pos.x, dz=p.z-e.pos.z, d=Math.hypot(dx,dz);
      e._fetching=true; wantYaw=Math.atan2(dx,dz);
      // grab from 1.7 (was 0.6): pass weapons sit on the counter, whose
      // collision box stops an enemy ~1.44 short of them -- at 0.6 they'd jog
      // to the pass and just STAND there forever, never close enough to grab,
      // which is exactly the "they loiter at the table until they get hit" bug.
      if(d>1.7){ move.set(dx/d,0,dz/d); }
      else { equipEnemy(e,p.key); p.taken=true; scene.remove(p.g);
        e.grabTarget=null; e.state='engage'; e.stateT=0.15;
        const hp=e.pos.clone(); hp.y=1.2; ring(hp,COL.flame,0.9); burst(hp,6,COL.flame,0.7); }
    }
  }
  else if(e.state==='holding'){                          // grappling the player (resolved player-side)
    wantYaw=Math.atan2(dirP.x,dirP.z);
    if(dist>0.95){ move.copy(dirP); }
    if(!player.grabbed || player.grabbed.by!==e){ e.state='recover'; e.stateT=0.4; }
  }
  else if(e.state==='engage'){
    // unarmed customers lunge in to grab you
    if(e.wpn==='fists' && dist<1.05 && !player.grabbed && grabCD<=0 && player.iframe<=0 && !player.dead && Math.random()<0.6){
      startGrab(e);
    } else {
    // hover near standoff and CIRCLE, rather than constantly crowding inward.
    // The old +0.9 inward bias meant they never settled -- they'd bee-line and
    // pile onto the player (and each other). +0.25 lets them hold their spacing
    // at range and orbit, closing only when they commit to an attack (below).
    let radial=(dist - e.standoff) + 0.25;
    if(player.attack && !player.attack.hit && dist < reach+1.4){
      const toE=Math.atan2(e.pos.x-player.pos.x, e.pos.z-player.pos.z);
      const aim=(player.attack.aim!=null?player.attack.aim:player.facing);
      let da=((toE-aim+Math.PI)%TAU)-Math.PI;
      if(Math.abs(da)<0.95) radial -= 1.2;            // small flinch off a swing
    }
    if(dist < reach*0.7) radial -= 0.6;
    if(Math.abs(radial)<0.2) radial=0;
    // stronger tangential drive (0.72, was 0.42) so the circling actually reads
    // as walking around you -- and armed ones show their weapon flourish while
    // they do, instead of standing still in your face.
    move.copy(_tang).multiplyScalar(e.circleDir*0.72).addScaledVector(dirP, clamp(radial,-1.1,2.0));
    // in range: commit now. otherwise roll for a dart-in on the beat.
    if(dist < reach+0.5 && tryToken(e)){ e.state='press'; e.stateT=rand(...e.aggr); }
    else if(e.stateT<=0){
      e.circleDir *= Math.random()<0.4?-1:1;
      e.stateT=rand(0.35,0.85);
      if(dist < reach+1.7 && Math.random()<e.commit && tryToken(e)){ e.state='press'; e.stateT=rand(...e.aggr); }
    }
    }
  }
  else if(e.state==='press'){                          // committed: close and hit
    if(dist>reach+0.05){ move.copy(dirP); }
    else { beginEnemyAttack(e,wantYaw); }
    if(e.stateT<=0 && !e.attack){ if(e.hasToken){e.hasToken=false;tokensUsed--;} e.state='engage'; e.stateT=rand(0.3,0.7); }
  }
  else if(e.state==='attacking'){ /* driven by attack integrate */ }
  else if(e.state==='recover'){                         // brief pull-back after swinging
    move.copy(dirP).multiplyScalar(-0.35).addScaledVector(_tang, e.circleDir*0.7);
    if(e.stateT<=0){ if(e.hasToken){ e.hasToken=false; tokensUsed--; } e.state='engage'; e.stateT=rand(0.25,0.6); }
  }

  // separation from other enemies -- wider radius (1.5, was 0.9) and stronger
  // push (0.95, was 0.7) so the mob spreads out around you and takes the room
  // instead of stacking into one clump on the player's face
  const sep=new V3();
  for(const o of enemies){ if(o===e||o.dead)continue; const dx=e.pos.x-o.pos.x,dz=e.pos.z-o.pos.z,d=Math.hypot(dx,dz);
    if(d<1.5&&d>0.001){ sep.x+=dx/d*(1.5-d); sep.z+=dz/d*(1.5-d); } }
  // ...but ease off separation while fetching, or the spread-out push fights
  // enemies trying to pack in at the pass and leaves them loitering just short
  // of a weapon they can never quite reach.
  move.addScaledVector(sep, e._fetching?0.3:0.95);

  // integrate
  if(!e.attack){
    if(move.lengthSq()>1) move.normalize();
    e.vel.x=damp(e.vel.x, move.x*e.spd, 8, dt);   // 8 (was 14): mobs carry momentum too
    e.vel.z=damp(e.vel.z, move.z*e.spd, 8, dt);
  } else {
    // STEP INTO IT: the mob commits its weight forward through the strike too
    const lv=attackDrive(e), fx=Math.sin(e.facing), fz=Math.cos(e.facing);
    e.vel.x=damp(e.vel.x, fx*lv, 12, dt);
    e.vel.z=damp(e.vel.z, fz*lv, 12, dt);
  }
  e.pos.addScaledVector(e.vel,dt);
  collide(e.pos,e.r);

  // attack integrate
  if(e.attack){
    const A=e.attack; A.t+=dt;
    e.facing=angLerp(e.facing, A.aim, Math.min(1,dt*12));
    // (the step-into-it lunge is driven by attackDrive() in the velocity integrate above)
    if(!A.hit&&A.t>=A.hitAt){ A.hit=true; syncEnemyMesh(e,dt,e.facing); resolveHit(e,false); }
    if(A.t>=A.dur){ e.attack=null; e.state='recover'; e.stateT=WEAPONS[e.wpn].rec+rand(0.2,0.6); }
  } else {
    e.speed=Math.hypot(e.vel.x,e.vel.z); e.movePhase+=dt*e.speed*2.4;
    e.facing=angLerp(e.facing, wantYaw, Math.min(1,dt*6));
  }
  syncEnemyMesh(e,dt,e.facing);
}
function tryToken(e){ if(e.hasToken)return true; if(tokensUsed<ATTACK_TOKENS){ tokensUsed++; e.hasToken=true; return true; } return false; }
let grabCD=0;
function nearestFreePickup(e){ let best=null,bd=99; for(const p of PICKUPS){ if(p.taken||p.planted)continue; const d=Math.hypot(p.x-e.pos.x,p.z-e.pos.z); if(d<bd){bd=d;best=p;} } return best; }
function equipEnemy(e,key){ e.wpn=key; e.dur=WEAPONS[key].dur; equip(e.chef,key); e.standoff=WEAPONS[key].reach+rand(0.25,0.7); if(AC)sfx.pickup(); }
function startGrab(e){
  if(player.grabbed||player.dead||player.iframe>0||grabCD>0) return;
  player.grabbed={ by:e, mash:0, need:(e.kind==='tough'?8:5), t:0, max:2.6, dmgT:0.4 };
  e.state='holding'; e.stateT=3.2; if(e.hasToken){ e.hasToken=false; tokensUsed--; }
  grabCD=2.4; shake(0.6); sfx.hurt(); haptic(0.85,0.6,200); kitchenBump(0.3);
  player.attack=null; player.dodge=null;
  const hp=player.pos.clone(); hp.y=1.5; popWord(hp,'GRABBED!','#ff8a3a',30);
}
function beginEnemyAttack(e,aim){
  if(e.attack)return;
  const heavy=Math.random()<0.25 && e.kind==='tough';
  const w=WEAPONS[e.wpn]; const wind=w.wind*e.wind*(heavy?1.4:1)+0.14;
  e.attack={ wpn:e.wpn, heavy, t:0, wind, active:0.09, rec:w.rec, dur:wind+0.09+w.rec, hitAt:wind, hit:false,
    side:(Math.random()<0.5?1:-1),
    shape:(e.wpn==='fists' ? PUNCHES[(Math.random()*PUNCHES.length)|0] : (heavy?FINISH:SWINGS[(Math.random()*SWINGS.length)|0])), aim };
  e.state='attacking';
}
function syncEnemyMesh(e,dt,wantYaw){
  e.chef.position.copy(e.pos); e.chef.rotation.y=e.facing;
  poseChef(e,false,dt);
}

/* ================================================================ POSE */
/* rotation-driven posing for both player & enemy. `a` is the actor object. */
function poseChef(a, isPlayer, dt){
  const c=a.chef, u=c.userData, b=u.body, up=u.upper;
  c.position.copy(a.pos); c.rotation.y=a.facing;

/* inject a directional impact into an actor's springs (recoil + hat bobble) */
// Directional hit reaction: decompose the incoming hit into the victim's LOCAL
// frame and kick the body-lean springs so they physically rock AWAY from the
// blow -- a side hit rolls them off it (rz), a frontal hit folds them back (rx),
// and the head WHIPLASHES first/furthest on the (previously unused) toqueZ/X
// channels. `hi` = contact height (a head-height hit levers harder than a gut
// shot); `weight` = the one feel scalar from resolveHit (heavier weapon = more
// snap). The springs themselves live in poseChef and settle it back.
function applyImpact(T, worldAng, power, hi, weight){
  const AN=T._an; if(!AN) return;
  const rel=worldAng - T.facing;
  const lev=clamp((hi==null?1.4:hi)-0.95, 0, 1.1);     // lever arm: high contact whips more
  const w=(0.7 + (weight==null?0.6:weight)*0.6);        // heavy weapons rock harder
  const cs=Math.cos(rel), sn=Math.sin(rel);
  AN.rxv    += cs*power*(6 + lev*6)*w;                  // axial fold (front/back)
  AN.rzv    += -sn*power*(9 + lev*4)*w;                 // lateral roll -- lean AWAY from a side hit
  AN.toqueZv += -sn*power*(10 + lev*8)*w;               // head whiplash, lateral (leads the body)
  AN.toqueXv += cs*power*4*w;                           // head whiplash, fore/aft (now directional)
}

function switchTarget(dir){

/* ---------- GRAB -> SLAM HEADS -> THROW OVERBOARD (Bond / Sleeping-Dogs finish) ----------

   the aim: into a prop -> head-SLAM (KO if they're low, else heavy damage + a
   bounce); over the terrace railing -> OVERBOARD ring-out (they sail off the deck

  if(P.pos.y>restY(P.pos.x,P.pos.z,P.pos.y,P.r)+0.1) return null;   // ground only

    const dx=e.pos.x-P.pos.x, dz=e.pos.z-P.pos.z, d=Math.hypot(dx,dz);

  let best=null, bs=-1;
  for(const e of enemies){ if(!canGrab(e)) continue;
    const dx=e.pos.x-P.pos.x, dz=e.pos.z-P.pos.z, d=Math.hypot(dx,dz)||1;

function startGrabRush(P, tgt){

// what a grab RUSH does on contact: grab an unarmed patron into the hold, wrestle

function updateSteal(P,dt,pad){
  const S=P.steal, e=S.e;

  S.t+=dt; P.iframe=Math.max(P.iframe,0.12);

    burst(cp,16,0xffe03d,1.4); ring(cp,COL.flame,1.3); if(AC){ sfx.pickup(); sfx.thud(0.8); } haptic(0.9,0.7,220);
    popWord(cp,'STOLE THE '+WEAPONS[S.wpn].name.toUpperCase()+'!','#ffe03d',26); addCombo(); return;

function updateHold(P,dt){

    const lbl=ctx.mode==='overboard'?'OVERBOARD':ctx.mode==='slam'?'SLAM':'THROW';

function throwContext(P){

    P.stagger=0.5; P.iframe=0.3; P.vel.set(-dx/d*9,0,-dz/d*9);
    e.state='recover'; e.stateT=0.7;
    shake(1.2); impactFrames(3,0xff3b30,0x140c07); hitPost(0.85,0xff3b30); sfx.hurt(); haptic(1.0,0.85,320);
    const hp=P.pos.clone(); hp.y=1.4; popWord(hp,'SLAMMED','#ff3b30',34); updateHUDHealth();
    if(P.hp<=0) playerDown();
    return;
  }
}

  buildRagdoll(player); if(player.rag) ragImpulse(player, _rp1.set(-Math.sin(player.facing),0.2,-Math.cos(player.facing)).normalize(), 1.1);
