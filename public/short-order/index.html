<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>SHORT ORDER — kitchen brawl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --grease:#1a120b; --char:#0d0906; --cream:#f4e4c1; --flame:#ff6a1e;
    --copper:#c77b3b; --steel:#7fb2d6; --herb:#8fc866; --tomato:#ff3b30; --ink:#2a1c10;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--char);color:var(--cream);
    font-family:"DM Mono",ui-monospace,monospace;-webkit-user-select:none;user-select:none;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block;width:100%;height:100%}

  /* ---------- HUD ---------- */
  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;
    font-family:"DM Mono",monospace;opacity:0;transition:opacity .4s}
  #hud.on{opacity:1}
  .disp{font-family:"Anton",Impact,sans-serif;letter-spacing:.02em}

  /* player plate: health + weapon */
  #plate{position:absolute;left:22px;top:20px;width:min(42%,340px)}
  #hpwrap{height:20px;background:#00000066;border:2px solid #00000088;border-radius:2px;
    box-shadow:0 3px 0 #0007, inset 0 0 0 1px #ffffff14;overflow:hidden;position:relative}
  #hpfill{position:absolute;inset:0;transform-origin:left;transform:scaleX(1);
    background:linear-gradient(90deg,var(--tomato),var(--flame));transition:transform .18s cubic-bezier(.2,.8,.2,1)}
  #hpfill.low{animation:hppanic .35s infinite}
  @keyframes hppanic{50%{filter:brightness(1.9)}}
  #hpghost{position:absolute;inset:0;transform-origin:left;transform:scaleX(1);
    background:#ffffff33;transition:transform .55s .12s ease-out}
  #hplabel{position:absolute;left:8px;top:1px;font-size:12px;line-height:18px;color:#fff;
    text-shadow:0 1px 1px #000;letter-spacing:.14em}
  #wpnrow{display:flex;align-items:center;gap:8px;margin-top:8px}
  #wpnname{font-family:"Anton",sans-serif;font-size:19px;color:var(--cream);
    text-shadow:0 2px 0 #0009;letter-spacing:.03em;white-space:nowrap}
  #pips{display:flex;gap:3px;flex-wrap:wrap;max-width:200px}
  .pip{width:9px;height:9px;background:var(--herb);box-shadow:0 0 6px #8fc86688, inset 0 0 0 1px #0004;
    transform:rotate(45deg);border-radius:1px}
  .pip.low{background:var(--flame);box-shadow:0 0 6px #ff6a1e88}
  .pip.crit{background:var(--tomato);box-shadow:0 0 8px #ff3b30aa}
  .pip.spent{background:#3a2a1a;box-shadow:none;opacity:.5}

  /* cooks-left counter */
  #cooks{position:absolute;right:22px;top:18px;text-align:right}
  #cooksN{font-family:"Anton",sans-serif;font-size:52px;line-height:.9;color:var(--cream);
    text-shadow:0 3px 0 #0009,0 0 22px #ff6a1e55}
  #cooksL{font-size:11px;letter-spacing:.35em;color:#c9a978;margin-top:2px}
  #waveL{font-size:10px;letter-spacing:.3em;color:#8a7250;margin-top:5px}

  /* combo */
  #combo{position:absolute;left:50%;bottom:60px;transform:translateX(-50%) scale(.6);
    text-align:center;opacity:0;transition:opacity .12s}
  #combo.on{opacity:1}
  #comboN{font-family:"Anton",sans-serif;font-size:60px;line-height:.85;color:var(--flame);
    text-shadow:0 3px 0 #0009,0 0 26px #ff6a1eaa}
  #comboL{font-size:12px;letter-spacing:.3em;color:#f4e4c1cc}

  /* prompt (pick up weapon) */
  #prompt{position:absolute;left:50%;bottom:32%;transform:translateX(-50%) translateY(10px);
    background:#120b06e0;border:2px solid var(--flame);border-radius:4px;padding:8px 14px;
    box-shadow:0 6px 0 #0008;opacity:0;transition:opacity .15s,transform .15s;text-align:center}
  #prompt.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #prompt b{font-family:"Anton",sans-serif;color:var(--flame);font-size:15px}
  #prompt .k{display:inline-grid;place-items:center;min-width:22px;height:22px;padding:0 5px;margin:0 2px;
    background:var(--cream);color:var(--ink);border-radius:4px;font-weight:700;font-size:12px;
    box-shadow:0 2px 0 #0007;vertical-align:middle}

  /* floating hit words layer */
  #words{position:absolute;inset:0;overflow:hidden}
  .word{position:absolute;font-family:"Anton",sans-serif;transform:translate(-50%,-50%) skewX(-7deg);
    text-shadow:5px 5px 0 #0009;will-change:transform,opacity;white-space:nowrap;
    -webkit-text-stroke:5px #140c07;paint-order:stroke fill;letter-spacing:.01em}

  /* toast */
  #toast{position:absolute;left:50%;top:76px;transform:translateX(-50%) translateY(-8px);
    background:#120b06e0;border-left:4px solid var(--copper);padding:7px 14px;font-size:13px;
    letter-spacing:.08em;color:var(--cream);opacity:0;transition:opacity .2s,transform .2s;box-shadow:0 4px 0 #0007}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- cards / overlays ---------- */
  #veil{position:fixed;inset:0;z-index:20;display:grid;place-items:center;
    background:radial-gradient(120% 90% at 50% 30%, #2a1a0c 0%, #0d0906 70%);
    transition:opacity .5s}
  #veil.hide{opacity:0;pointer-events:none}
  .card{text-align:center;max-width:min(92%,640px);padding:24px}
  .kick{font-size:12px;letter-spacing:.5em;color:var(--flame);margin-bottom:10px}
  .title{font-family:"Anton",sans-serif;font-size:clamp(52px,calc(var(--u,6.4px)*15),150px);line-height:.82;
    color:var(--cream);text-shadow:0 6px 0 #000a, 0 0 44px #ff6a1e44;letter-spacing:.01em}
  .title .b{color:var(--flame)}
  .sub{margin:14px auto 0;max-width:440px;color:#d9c4a0;font-size:14px;line-height:1.6}
  .btn{pointer-events:auto;cursor:pointer;margin-top:26px;display:inline-block;
    font-family:"Anton",sans-serif;font-size:24px;letter-spacing:.06em;color:var(--ink);
    background:var(--flame);padding:12px 34px;border:0;border-radius:5px;
    box-shadow:0 6px 0 #7a2d06, 0 10px 22px #0007;transition:transform .08s, box-shadow .08s}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #7a2d06}
  .end .title{font-size:clamp(40px,calc(var(--u,6.4px)*12),120px)}
  .end.win .title{color:var(--herb);text-shadow:0 6px 0 #000a,0 0 44px #8fc86655}
  .end.lose .title{color:var(--tomato);text-shadow:0 6px 0 #000a,0 0 44px #ff3b3055}
  .stat{margin-top:16px;font-size:14px;color:#d9c4a0;letter-spacing:.06em}
  .stat b{color:var(--cream)}

  /* controls sheet */
  #ctrls{margin:22px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;
    max-width:520px;text-align:left;font-size:12.5px;color:#cbb28c}
  #ctrls .r{display:flex;justify-content:space-between;gap:12px;
    border-bottom:1px dotted #ffffff1a;padding:4px 0}
  #ctrls .r b{color:var(--cream);font-weight:500}
  #ctrls .pad{color:var(--steel)}
  @media (max-width:560px){ #ctrls{grid-template-columns:1fr} #plate{top:14px;left:14px} #cooks{top:12px;right:14px} }

  .hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:11px;letter-spacing:.18em;color:#7a6647;opacity:0;transition:opacity .5s}
  .hint.on{opacity:1}
  #vign{position:fixed;inset:0;pointer-events:none;z-index:9;
    box-shadow:inset 0 0 200px 40px #000000aa;opacity:.32}
  #grabui{position:absolute;left:50%;top:56%;transform:translateX(-50%);text-align:center;opacity:0;pointer-events:none;transition:opacity .08s;z-index:8}
  #grabui.on{opacity:1}
  #grabui .gmsg{font-family:"Anton",sans-serif;font-size:calc(var(--u)*5);color:#ff8a3a;
    -webkit-text-stroke:4px #140c07;paint-order:stroke fill;transform:skewX(-6deg);animation:mashpulse .28s infinite}
  @keyframes mashpulse{50%{transform:skewX(-6deg) scale(1.09)}}
  #grabui .gbarwrap{width:calc(var(--u)*42);height:calc(var(--u)*2.6);margin:calc(var(--u)*2) auto 0;
    background:#0009;border:2px solid #ff8a3a;transform:skewX(-10deg);overflow:hidden}
  #grabui #grabfill{display:block;height:100%;width:100%;transform-origin:left;transform:scaleX(0);
    background:linear-gradient(90deg,#ff8a3a,#ffe03d)}
  #dmgflash{position:fixed;inset:0;pointer-events:none;z-index:8;background:var(--tomato);opacity:0}

  /* ---------- stage: always-landscape rotation ---------- */
  html,body{background:#000;overscroll-behavior:none}
  #stage{position:fixed;top:0;left:0;overflow:hidden;transform-origin:top left;background:var(--char)}
  #app,#dmgflash,#vign,#hud,#veil,#touch,.hint{position:absolute}

  /* ---------- touch controls ---------- */
  #touch{inset:0;z-index:15;pointer-events:none;display:none;font-family:"DM Mono",monospace}
  #touch.on{display:block}
  .tzone{pointer-events:auto;touch-action:none}
  .b{pointer-events:auto;touch-action:none;border:0;background:none;color:var(--cream);
    font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
  #tstick{position:absolute;left:calc(var(--u)*5);bottom:calc(var(--u)*8);
    width:calc(var(--u)*30);height:calc(var(--u)*30);border-radius:50%;
    background:radial-gradient(circle,#ffffff12,#ffffff05);border:2px solid #ffffff2e;box-shadow:inset 0 0 22px #0007}
  #tnub{position:absolute;left:50%;top:50%;width:44%;height:44%;margin:-22% 0 0 -22%;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#ffe9c8,#c77b3b);border:2px solid #ffffff88;
    box-shadow:0 4px 12px #0009;will-change:transform}
  #tface{position:absolute;right:calc(var(--u)*4);bottom:calc(var(--u)*5);
    width:calc(var(--u)*42);height:calc(var(--u)*42);display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);place-items:center;pointer-events:none}
  .bg{width:calc(var(--u)*13.5);height:calc(var(--u)*13.5);border-radius:50%;display:grid;place-items:center;
    background:#160f08cc;border:2px solid #ffffff30;box-shadow:0 5px 0 #0007,inset 0 0 12px #0006;transition:transform .05s}
  .bg .g{font-size:calc(var(--u)*6.4);line-height:1;transform:translateY(-1px)}
  .bg .lab{font-size:calc(var(--u)*3);font-weight:700;letter-spacing:.04em}
  .bg.press{transform:translateY(3px);box-shadow:0 2px 0 #0007,inset 0 0 12px #0008;filter:brightness(1.35)}
  .cross{grid-column:2;grid-row:3;border-color:#7fb2d6;color:#bfe0f5}
  .square{grid-column:1;grid-row:2;border-color:#ff6a9a;color:#ffc2d6}
  .tri{grid-column:2;grid-row:1;border-color:#8fc866;color:#cdebb4}
  .roll{grid-column:3;grid-row:2;border-color:#f4e4c1;color:#f4e4c1}
  .pill{position:absolute;right:calc(var(--u)*49);bottom:calc(var(--u)*9);
    width:calc(var(--u)*13);height:calc(var(--u)*23);border-radius:calc(var(--u)*7);
    background:#160f08cc;border:2px solid var(--copper);box-shadow:0 5px 0 #0007;
    font-size:calc(var(--u)*3.4);letter-spacing:.14em;writing-mode:vertical-rl;text-orientation:mixed;display:grid;place-items:center}
  .pill.press{transform:translateY(3px);filter:brightness(1.35)}
  .mini{width:calc(var(--u)*11);height:calc(var(--u)*11);border-radius:50%;display:grid;place-items:center;
    background:#160f08cc;border:2px solid #ffffff30;box-shadow:0 4px 0 #0007;font-size:calc(var(--u)*3);letter-spacing:.06em}
  .mini.press{transform:translateY(2px);filter:brightness(1.35)}
  #bLock{position:absolute;right:calc(var(--u)*4);top:calc(var(--u)*4)}
  #tcam{position:absolute;left:calc(var(--u)*4);top:calc(var(--u)*4);display:flex;gap:calc(var(--u)*2.5)}
</style>
</head>
<body>
<div id="stage">
<div id="app"></div>
<div id="dmgflash"></div>
<div id="vign"></div>

<div id="hud">
  <div id="plate">
    <div id="hpwrap">
      <div id="hpghost"></div><div id="hpfill"></div>
      <div id="hplabel">HEALTH</div>
    </div>
    <div id="wpnrow"><div id="wpnname">BARE HANDS</div><div id="pips"></div></div>
  </div>
  <div id="cooks"><div id="cooksN">0</div><div id="cooksL">COOKS ON THE LINE</div><div id="waveL"></div></div>
  <div id="combo"><div id="comboN">0</div><div id="comboL">HIT COMBO</div></div>
  <div id="prompt"></div>
  <div id="toast"></div>
  <div id="grabui"><div class="gmsg">MASH TO BREAK FREE!</div><div class="gbarwrap"><i id="grabfill"></i></div></div>
  <div id="words"></div>
</div>
<div class="hint" id="hint"></div>

<div id="touch">
  <div id="tstick" class="tzone"><div id="tnub"></div></div>
  <div id="tface">
    <button class="b bg square" data-b="heavy"><span class="lab">HEAVY</span></button>
    <button class="b bg tri" data-b="pickup"><span class="lab">GRAB</span></button>
    <button class="b bg roll" data-b="dodge"><span class="lab">DASH</span></button>
    <button class="b bg cross" data-b="light"><span class="lab">HIT</span></button>
  </div>
  <button id="bGuard" class="b pill" data-hold="guard">GUARD</button>
  <button id="bLock" class="b mini" data-b="lock">LOCK</button>
  <div id="tcam">
    <button class="b mini" data-hold="camL">&#9668;</button>
    <button class="b mini" data-hold="camR">&#9658;</button>
  </div>
</div>

<div id="veil">
  <div class="card" id="card"></div>
</div>
</div><!--/stage-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
/* =========================================================================
   SHORT ORDER — a 3D kitchen beat-'em-up vertical slice.
   Free roam, soft auto-aim, weight-driven weapons that break.
   Built crowd-first; carries the "chunky flat-shaded + juice" DNA of Glass Jaw.
   The whole night is wrapped in startNight(cfg,onEnd) so a cooking-loop layer
   can feed it a config and read a result later without touching the innards.
   ========================================================================= */
const V3 = THREE.Vector3;
const TAU = Math.PI*2;
const clamp = (v,a,b)=>v<a?a:v>b?b:v;
const lerp  = (a,b,t)=>a+(b-a)*t;
const rand  = (a,b)=>a+Math.random()*(b-a);
const damp  = (cur,tgt,l,dt)=>cur+(tgt-cur)*(1-Math.exp(-l*dt));
const angLerp=(a,b,t)=>{let d=((b-a+Math.PI)%TAU)-Math.PI; if(d<-Math.PI)d+=TAU; return a+d*t;};

/* palette */
const COL = { cream:0xf4e4c1, flame:0xff6a1e, copper:0xc77b3b, steel:0x7fb2d6,
  herb:0x8fc866, tomato:0xff3b30, ink:0x2a1c10, steelmat:0xb9c4cc, dark:0x0d0906 };

/* ---------------------------------------------------------------- renderer */
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.12;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x140d07);
scene.fog = new THREE.Fog(0x140d07, 14, 30);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 120);
camera.position.set(0,6,9);

/* ---------------------------------------------------------- post-processing */
const DPR = Math.min(devicePixelRatio,2);
const rt = new THREE.WebGLRenderTarget(2,2,{ minFilter:THREE.LinearFilter, magFilter:THREE.LinearFilter, format:THREE.RGBAFormat });
const postScene = new THREE.Scene();
const postCam = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const POST = new THREE.ShaderMaterial({
  uniforms:{
    tDiffuse:{value:rt.texture},
    uAber:{value:0}, uZoom:{value:0}, uFlash:{value:0}, uGlitch:{value:0},
    uShock:{value:0}, uSat:{value:1}, uTime:{value:0}, uImpact:{value:0},
    uFlashCol:{value:new THREE.Color(0xffffff)},
    uImpA:{value:new THREE.Color(0xFFE03D)}, uImpB:{value:new THREE.Color(0x140c07)}
  },
  vertexShader:'varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position.xy,0.,1.); }',
  fragmentShader:[
  'uniform sampler2D tDiffuse;',
  'uniform float uAber,uZoom,uFlash,uGlitch,uShock,uSat,uTime,uImpact;',
  'uniform vec3 uFlashCol, uImpA, uImpB;',
  'varying vec2 vUv;',
  'float hash(float n){ return fract(sin(n)*43758.5453); }',
  'void main(){',
  '  vec2 uv=vUv; vec2 c=uv-0.5; float r=length(c); vec2 dir=c/max(r,0.0001);',
  '  if(uShock>0.001){ float d=abs(r-uShock*0.85); float w=smoothstep(0.10,0.0,d)*(1.0-uShock); uv+=dir*w*0.075; }',
  '  if(uGlitch>0.001){ float band=floor(uv.y*22.0); float n=hash(band*13.13+floor(uTime*46.0)); uv.x+=(n-0.5)*uGlitch*0.14*step(0.55,n); }',
  '  float ab=uAber*(0.18+r*1.4); vec3 sum=vec3(0.0); float tot=0.0;',
  '  for(int i=0;i<6;i++){ float t=float(i)/5.0; vec2 s=uv-c*uZoom*t; float w=1.0-t*0.55;',
  '    sum.r+=texture2D(tDiffuse,s+dir*ab).r*w; sum.g+=texture2D(tDiffuse,s).g*w; sum.b+=texture2D(tDiffuse,s-dir*ab).b*w; tot+=w; }',
  '  vec3 col=sum/tot;',
  '  float l=dot(col,vec3(0.299,0.587,0.114)); col=mix(vec3(l),col,uSat);',
  '  col+=uFlashCol*uFlash;',
  '  if(uImpact>0.5){ float li=dot(col,vec3(0.299,0.587,0.114)); float e=smoothstep(0.30,0.46,li); col=mix(uImpB,uImpA,step(0.5,e)); }',
  '  col*=1.0-0.05*step(0.5,fract(gl_FragCoord.y*0.5));',
  '  col*=smoothstep(1.12,0.30,r);',
  '  gl_FragColor=vec4(col,1.0);',
  '}'].join('\n')
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), POST));
const IMP={ frames:0 };
function impactFrames(n,a,b){ IMP.frames=Math.max(IMP.frames,n);
  POST.uniforms.uImpA.value.setHex(a===undefined?0xFFE03D:a);
  POST.uniforms.uImpB.value.setHex(b===undefined?0x140c07:b); }
function postTick(raw){
  const U=POST.uniforms, k=1-Math.min(1,raw*9);
  U.uAber.value*=k; U.uZoom.value*=k; U.uFlash.value*=k; U.uGlitch.value*=k; U.uShock.value*=k;
  U.uSat.value += (1-U.uSat.value)*Math.min(1,raw*6);
  if(U.uShock.value>0.001) U.uShock.value=Math.min(1, U.uShock.value+raw*3.2); // expanding ring
  U.uTime.value=GAME.t;
  U.uImpact.value = IMP.frames>0 ? 1 : 0; if(IMP.frames>0) IMP.frames--;
}
function hitPost(power,col){ const U=POST.uniforms;
  U.uAber.value=0.004+power*0.012; U.uZoom.value=0.03+power*0.075;
  U.uFlash.value=0.10+power*0.28; U.uFlashCol.value.setHex(col); U.uShock.value=0.001;
  if(power>0.7) U.uGlitch.value=0.6; }

/* ---------------------------------------------------------------- lights */
const hemi = new THREE.HemisphereLight(0xffdcae, 0x1a0e06, 0.55); scene.add(hemi);
const key = new THREE.DirectionalLight(0xffe3b0, 1.5);
key.position.set(6,12,4); key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.near=1; key.shadow.camera.far=44;
key.shadow.camera.left=-16; key.shadow.camera.right=16; key.shadow.camera.top=16; key.shadow.camera.bottom=-16;
key.shadow.bias=-0.0007; key.shadow.radius=3;
scene.add(key);
const fill = new THREE.DirectionalLight(0x6f9fd0, 0.5); fill.position.set(-8,6,-6); scene.add(fill);
const stoveGlow = new THREE.PointLight(0xff6a1e, 0.9, 16, 2); stoveGlow.position.set(-8.5,1.4,-4); scene.add(stoveGlow);
const rim = new THREE.PointLight(0x8fc866, 0.5, 20, 2); rim.position.set(9,3,7); scene.add(rim);

/* ================================================================ ARENA */
const ARENA = { w:22, d:15 };       // interior half handled below
const HALFW = ARENA.w/2, HALFD = ARENA.d/2;
const OBST = [];                     // {x,z,rx,rz} axis-aligned boxes for collision
const arena = new THREE.Group(); scene.add(arena);

function tileTex(){
  const c=document.createElement('canvas'); c.width=c.height=256; const g=c.getContext('2d');
  const a='#e9d7ad', b='#3a3f45';
  for(let y=0;y<4;y++)for(let x=0;x<4;x++){ g.fillStyle=((x+y)&1)?a:b; g.fillRect(x*64,y*64,64,64); }
  g.globalAlpha=.08; g.fillStyle='#000';
  for(let i=0;i<400;i++){ g.fillRect(Math.random()*256,Math.random()*256,2,2); }
  g.globalAlpha=1; g.strokeStyle='#00000033'; g.lineWidth=2;
  for(let i=0;i<=256;i+=64){ g.beginPath();g.moveTo(i,0);g.lineTo(i,256);g.moveTo(0,i);g.lineTo(256,i);g.stroke(); }

const _tb=new V3(),_dirN=new V3(),_bnd=new V3(),_jnt=new V3(),_om=new V3(),_kt=new V3(),_knee=new V3();
function orientBone(mesh,a,b){
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  _om.subVectors(b,a); const len=Math.max(_om.length(),0.01);
  mesh.scale.set(1,len,1); mesh.quaternion.setFromUnitVectors(UP,_om.normalize());
}
/* length-LOCKED bone: always exactly `L` long, anchored at a, pointing at b.
   a bone can never stretch — if the target's out of reach the limb falls short. */
function orientFixed(mesh,a,b,L){
  _om.subVectors(b,a); const d=_om.length(); if(d<1e-5) _om.set(0,-1,0); else _om.divideScalar(d);
  mesh.position.copy(a).addScaledVector(_om, L*0.5);
  mesh.scale.set(1, L, 1); mesh.quaternion.setFromUnitVectors(UP, _om);
}
function solveTwoBone(b1,b2,root,tip,L1,L2,bendDir,outJoint){
  _tb.subVectors(tip,root); let d=_tb.length(); if(d<1e-4){ _tb.set(0,-1,0); d=1e-4; }
  _dirN.copy(_tb).divideScalar(d);
  if(d>=L1+L2){ _jnt.copy(root).addScaledVector(_dirN, d*(L1/(L1+L2))); }
  else{
    _bnd.copy(bendDir); _bnd.addScaledVector(_dirN,-_bnd.dot(_dirN));
    if(_bnd.lengthSq()<1e-5){ _bnd.set(0,-1,0).addScaledVector(_dirN,_dirN.y); }
    _bnd.normalize();
    const a=(L1*L1-L2*L2+d*d)/(2*d); const h=Math.sqrt(Math.max(0,L1*L1-a*a));
    _jnt.copy(root).addScaledVector(_dirN,a).addScaledVector(_bnd,h);
  }
  // lock the knee to exactly L1 from the root along the bend direction, then
  // draw both bones at fixed length — reachable poses are unchanged, over-reach
  // just leaves the foot short instead of stretching the leg.
  _kt.subVectors(_jnt,root); const kl=_kt.length(); if(kl>1e-5) _kt.divideScalar(kl); else _kt.set(0,-1,0);
  _knee.copy(root).addScaledVector(_kt, L1);
  orientFixed(b1, root, _knee, L1);
  orientFixed(b2, _knee, tip, L2);
  if(outJoint) outJoint.copy(_knee);
}

/* ---- squish: flesh dents on contact via an injected vertex-shader push ---- */
const SQUISH={ headMax:0.14, radius:0.30, stiff:380, damp:9, rebound:0.70 };
function dentify(mat, radius){
  const u={ uDentP:{value:new V3(0,99,0)}, uDentN:{value:new V3(0,0,1)}, uDentA:{value:0}, uDentR:{value:radius||SQUISH.radius} };
  mat.userData.u=u;
  mat.onBeforeCompile=function(sh){
    sh.uniforms.uDentP=u.uDentP; sh.uniforms.uDentN=u.uDentN; sh.uniforms.uDentA=u.uDentA; sh.uniforms.uDentR=u.uDentR;
    sh.vertexShader='uniform vec3 uDentP; uniform vec3 uDentN; uniform float uDentA; uniform float uDentR;\n'
      + sh.vertexShader.replace('#include <begin_vertex>',
        '#include <begin_vertex>\nfloat dD=distance(transformed,uDentP);\nfloat dW=smoothstep(uDentR,0.0,dD);\ndW=dW*dW*(3.0-2.0*dW);\ntransformed+=uDentN*(uDentA*dW);\n');
  };
  mat.customProgramCacheKey=function(){ return 'dent'; };
  return mat;
}
function deform(max){ return { a:0, v:0, t:0, max:max, p:new V3(0,99,0), n:new V3(0,0,1) }; }
const _lp=new V3();
function springDeform(d, raw){
  d.v += ((d.t-d.a)*SQUISH.stiff - d.v*SQUISH.damp)*raw;
  d.a += d.v*raw;
  d.a = clamp(d.a, -d.max*SQUISH.rebound, d.max);
  d.t = 0;
}
function applyDeform(mesh, d, scale){
  const u=mesh.material.userData.u; if(!u) return;
  u.uDentA.value = d.a/(scale||1); u.uDentP.value.copy(d.p); u.uDentN.value.copy(d.n);
}

    mats:{ skin, jacket:torso.material, apron:apronMat, scarf:scarf?scarf.material:null },

let AC=null, master=null;
function audioInit(){ if(AC)return; const A=window.AudioContext||window.webkitAudioContext; if(!A)return;
  AC=new A(); master=AC.createGain(); master.gain.value=0.5; master.connect(AC.destination); kitchenInit(); }

/* ---- room tone: pink noise (a kitchen breathes), lowpass vent murmur + a
   bandpass "sizzle" band that opens up when the action does (à la Glass Jaw) ---- */
const ROOM={ on:false, level:0, spike:0, murmurG:null, sizzleG:null, sizzleF:null };
function pinkBuffer(seconds){
  const sr=AC.sampleRate, n=(sr*seconds)|0, buf=AC.createBuffer(2,n,sr);
  for(let ch=0;ch<2;ch++){ const d=buf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<n;i++){ const w=Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759; b2=0.96900*b2+w*0.1538520;
      b3=0.86650*b3+w*0.3104856; b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      const pink=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
      const t=i/sr, ph=ch*1.7, wob=0.72+0.28*Math.sin(t*0.5+ph)*Math.sin(t*0.19+ph*0.5);
      d[i]=pink*wob; } }
  return buf;
}
function kitchenInit(){ if(!AC||ROOM.on)return;
  const buf=pinkBuffer(6);
  const layer=(type,freq,q,gain)=>{ const s=AC.createBufferSource(); s.buffer=buf; s.loop=true;
    const f=AC.createBiquadFilter(); f.type=type; f.frequency.value=freq; if(q)f.Q.value=q;
    const g=AC.createGain(); g.gain.value=gain; s.connect(f).connect(g).connect(master);
    s.start(Math.random()*3); return {g,f}; };
  const murmur=layer('lowpass',480,0.7,0);
  const sizzle=layer('bandpass',2600,0.6,0);
  ROOM.murmurG=murmur.g; ROOM.sizzleG=sizzle.g; ROOM.sizzleF=sizzle.f; ROOM.on=true;
}
function kitchenBump(v){ ROOM.spike=Math.min(1.5, ROOM.spike+v); }
function kitchenTick(raw){ if(!ROOM.on)return;
  ROOM.spike=Math.max(0, ROOM.spike-raw*0.85);
  let base = GAME.mode==='play' ? 0.22 + Math.min(0.25, GAME.combo*0.02) : 0.12;
  const want=Math.min(1.4, base+ROOM.spike);
  ROOM.level += (want-ROOM.level)*Math.min(1, raw*(want>ROOM.level?6:1.6));
  const L=ROOM.level;
  ROOM.murmurG.gain.value = 0.05 + L*0.06;
  ROOM.sizzleG.gain.value = Math.max(0, L-0.25)*0.10;
  ROOM.sizzleF.frequency.value = 2200 + L*1400;   // busier kitchen gets brighter/hotter
}
/* one call site for buzz: the phone and any pad motors */
function haptic(strong, weak, ms){
  if(navigator.vibrate){ try{ navigator.vibrate(Math.round(ms*0.5)); }catch(e){} }
  const gp=GP._pad;
  if(gp && gp.vibrationActuator){ try{
    gp.vibrationActuator.playEffect('dual-rumble',{duration:ms,strongMagnitude:strong,weakMagnitude:weak});
  }catch(e){} }
}
function env(node,g,dur,a){ const t=AC.currentTime; const gg=AC.createGain(); gg.gain.setValueAtTime(0,t);
  gg.gain.linearRampToValueAtTime(g,t+(a||0.005)); gg.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  node.connect(gg); gg.connect(master); node.start(t); node.stop(t+dur+0.02); }
function tone(f0,f1,dur,type,g){ if(!AC)return; const o=AC.createOscillator(); o.type=type||'sine';
  o.frequency.setValueAtTime(f0,AC.currentTime); o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),AC.currentTime+dur); env(o,g,dur); }
function noise(dur,g,freq,q){ if(!AC)return; const n=AC.createBufferSource();
  const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; n.buffer=b;
  const f=AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q||1;
  n.connect(f); const gg=AC.createGain(); gg.gain.setValueAtTime(g,AC.currentTime);
  gg.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur); f.connect(gg); gg.connect(master); n.start(); n.stop(AC.currentTime+dur); }

function pollPad(){
  const pads=navigator.getGamepads?navigator.getGamepads():[];

    light:false,heavy:false,pickup:false,grab:false, guard:false,dodge:false,
    camL:false,camR:false, lock:false, start:false };
  if(!gp){ return out; }
  const a=gp.axes, b=gp.buttons;
  const radial=(x,y,dead)=>{ const m=Math.hypot(x,y); if(m<dead) return [0,0];
    const s=((m-dead)/(1-dead))/m; return [x*s,y*s]; };
  const mv=radial(a[0]||0, a[1]||0, 0.20); out.move.set(mv[0], mv[1]);
  const rs=radial(a[2]||0, a[3]||0, 0.22); out.rstick.set(rs[0], rs[1]);
  const dz=v=>Math.abs(v)<0.18?0:v;
  const pressed=i=>b[i]&&b[i].pressed;
  const tap=i=>{ const p=pressed(i); const was=GP.prev[i]; GP.prev[i]=p; return p&&!was; };
  out.light=tap(0);         // cross
  out.heavy=tap(2);         // square
  out.pickup=tap(3);        // triangle
  out.grab=tap(1);          // circle
  out.guard=(b[6]&&b[6].value>0.4)||pressed(6); // L2 held
  out.dodge=(b[7]&&b[7].value>0.4)||pressed(7); // R2 held (with stick = dodge)
  out.camL=pressed(4); out.camR=pressed(5);     // L1/R1
  out.lock=tap(10)||tap(11);                     // stick click
  out.start=tap(9);
  GP.axes=[a[0]||0,a[1]||0,a[2]||0,a[3]||0];

}

/* analog stick */
const stickBase=document.getElementById('tstick'), stickNub=document.getElementById('tnub');
const stick={ id:null, ox:0, oy:0, R:1 };
function stickMove(ev){ const dx=ev.clientX-stick.ox, dy=ev.clientY-stick.oy; const s=clientToStage(dx,dy);
  let nx=s.x/stick.R, ny=s.y/stick.R; const m=Math.hypot(nx,ny); if(m>1){ nx/=m; ny/=m; }
  TOUCH.moveX=nx; TOUCH.moveY=ny;
  if(stickNub) stickNub.style.transform='translate('+(nx*stick.R)+'px,'+(ny*stick.R)+'px)'; }
function stickEnd(){ stick.id=null; TOUCH.moveX=0; TOUCH.moveY=0; if(stickNub) stickNub.style.transform='translate(0,0)'; }
if(stickBase){
  stickBase.addEventListener('pointerdown',ev=>{ ev.preventDefault(); audioInit(); if(AC&&AC.state==='suspended')AC.resume();
    stick.id=ev.pointerId; const r=stickBase.getBoundingClientRect();
    stick.ox=r.left+r.width/2; stick.oy=r.top+r.height/2; stick.R=r.width*0.5; stickMove(ev); });
  addEventListener('pointermove',ev=>{ if(stick.id===ev.pointerId) stickMove(ev); },{passive:false});
  addEventListener('pointerup',ev=>{ if(stick.id===ev.pointerId) stickEnd(); });
  addEventListener('pointercancel',ev=>{ if(stick.id===ev.pointerId) stickEnd(); });
}
/* buttons: data-b = tap (edge), data-hold = held */
(document.querySelectorAll('#touch [data-b]')||[]).forEach(el=>{
  el.addEventListener('pointerdown',ev=>{ ev.preventDefault(); audioInit(); if(AC&&AC.state==='suspended')AC.resume();
    TOUCH[el.dataset.b+'Edge']=true; el.classList.add('press'); });
  const up=()=>el.classList.remove('press');
  el.addEventListener('pointerup',ev=>{ ev.preventDefault(); up(); });
  el.addEventListener('pointercancel',up); el.addEventListener('pointerleave',up);
});
(document.querySelectorAll('#touch [data-hold]')||[]).forEach(el=>{
  const n=el.dataset.hold;
  el.addEventListener('pointerdown',ev=>{ ev.preventDefault(); TOUCH[n]=true;
    if(n==='camL')TOUCH.camLedge=true; if(n==='camR')TOUCH.camRedge=true; el.classList.add('press'); });
  const up=()=>{ TOUCH[n]=false; el.classList.remove('press'); };
  el.addEventListener('pointerup',ev=>{ ev.preventDefault(); up(); });
  el.addEventListener('pointercancel',up); el.addEventListener('pointerleave',up);
});

/* ================================================================ CAMERA */
const CAM={ yaw:Math.PI, dist:5.8, height:3.2, lockK:0, look:new V3(), pos:new V3() };
const camFwd=new V3(), camRight=new V3();
function updateCameraVectors(){ camFwd.set(Math.sin(CAM.yaw),0,Math.cos(CAM.yaw)); camRight.set(-camFwd.z,0,camFwd.x); }

/* ================================================================ HELPERS */
function collide(pos,r){
  pos.x=clamp(pos.x,-HALFW+r+0.3,HALFW-r-0.3);
  pos.z=clamp(pos.z,-HALFD+r+0.3,HALFD-r-0.3);
  for(const o of OBST){
    const dx=pos.x-o.x, dz=pos.z-o.z;
    const px=(o.rx+r)-Math.abs(dx), pz=(o.rz+r)-Math.abs(dz);
    if(px>0&&pz>0){ if(px<pz){ pos.x+=(dx<0?-px:px); } else { pos.z+=(dz<0?-pz:pz); } }
  }
}
function nearestEnemy(fromPos, facingYaw, cone){
  let best=null,bd=1e9;
  for(const e of enemies){ if(e.dead)continue;
    const dx=e.pos.x-fromPos.x, dz=e.pos.z-fromPos.z, d=Math.hypot(dx,dz);
    if(cone!=null){ const ang=Math.atan2(dx,dz); let da=((ang-facingYaw+Math.PI)%TAU)-Math.PI;
      if(Math.abs(da)>cone) continue; }
    if(d<bd){ bd=d; best=e; } }
  return best;
}

/* ================================================================ COMBAT */
function startAttack(atk){ // atk shared by player/enemy: {heavy}
  const A=atk.actor, w=WEAPONS[atk.wpn];
  if(A.attack||A.stagger>0||A.dead||(A.dodge)) return false;
  if(atk.heavy && w.dur!==Infinity && A.dur<2 && A.wpn!=='fists'){ /* not enough for heavy; allow but will break */ }
  const wind=w.wind*(atk.heavy?1.5:1), active=0.09, rec=w.rec*(atk.heavy?1.3:1);
  A.attack={ wpn:atk.wpn, heavy:atk.heavy, t:0, wind, active, rec, dur:wind+active+rec,
    hitAt:wind, hit:false, side:(A.comboStep%2===0)?1:-1,
    shape:(A.wpn==='fists'
      ? (atk.heavy?PUNCH_FINISH:PUNCHES[(A.comboStep||0)%PUNCHES.length])
      : (atk.heavy?FINISH:SWINGS[(A.comboStep||0)%SWINGS.length])), target:atk.target||null };
  if(w.metal) {} // swing sound at hit
  return true;
}
function resolveHit(A, isPlayer){
  const w=WEAPONS[A.attack.wpn], heavy=A.attack.heavy;
  const reach=w.reach + (isPlayer?0.25:0.1);
  const dmg=(heavy?w.heavy:w.light) * (isPlayer? (1+Math.min(GAME.combo,8)*0.03) : 1);
  const facing=A.facing;
  const origin=A.pos;
  let landed=false;
  const targets = isPlayer? enemies : [player];
  for(const T of targets){
    if(T.dead) continue;
    const dx=T.pos.x-origin.x, dz=T.pos.z-origin.z, d=Math.hypot(dx,dz);
    if(d>reach+T.r) continue;
    const ang=Math.atan2(dx,dz); let da=((ang-facing+Math.PI)%TAU)-Math.PI;
    const arc = w.thrust?0.5:0.95;
    if(Math.abs(da)>arc) continue;
    // hit!
    landed=true;
    const cpos=new V3(lerp(origin.x,T.pos.x,0.6),1.4,lerp(origin.z,T.pos.z,0.6));
    let taken=dmg, blocked=false;
    if(!isPlayer && player.guard && player.guardV>0.5){
      const gAng=Math.abs(((facing+Math.PI-player.facing+Math.PI)%TAU)-Math.PI);
      // block if player roughly faces the incoming hit
      const toAtt=Math.atan2(origin.x-player.pos.x,origin.z-player.pos.z);
      let fa=((toAtt-player.facing+Math.PI)%TAU)-Math.PI;
      if(Math.abs(fa)<1.2){ blocked=true; taken*=w.gbreak?0.55:0.12; }
    }
    if(!isPlayer && (player.iframe>0)) { taken=0; blocked=false; continue; }
    T.hp-=taken;
    T.hurt=1;
    // knockback
    const kb=(heavy?0.9:0.5)*(w.knock?1.7:1)*(blocked?0.3:1);
    T.vel.x+=Math.sin(ang)*kb*6; T.vel.z+=Math.cos(ang)*kb*6;
    T.stagger=Math.max(T.stagger, (blocked?0.15:w.stagger*(heavy?1.2:0.8)) );
    punchScale(T.chef, heavy?0.3:0.18);
    applyImpact(T, ang, (heavy?1.4:0.85)*(blocked?0.4:1));
    // ---- JUICE, scaled by how heavy the weapon is ----
    const heft = w.heft==null?0.3:w.heft;
    const weight = clamp(heft*(heavy?1.0:0.6) + Math.min(GAME.combo,10)*0.015, 0, 1.3);  // felt weight of the blow
    const bw = blocked?0.4:1;
    const col = blocked?0xffffff : (w.metal?0xffe6a0:0xff9a4a);
    burst(cpos, Math.round(((blocked?6:11) + weight*30)*bw + 2), col, (0.9 + weight*2.4)*bw);
    ring(cpos, w.metal?COL.cream:COL.flame, (1.0 + weight*1.7)*bw);
    if(weight>0.55 && !blocked){ ring(cpos, 0xffffff, 1.5+weight); burst(cpos, 8, 0xffffff, 1.6+weight); }
    shake((0.16 + weight*1.4) * bw);
    hitstop((0.03 + weight*0.17) * (blocked?0.5:1));
    const power=Math.min(1, weight*1.15) * bw;
    impactFrames(weight>0.75?4:(weight>0.45?3:(weight>0.2?2:1)), blocked?0x7fb2d6:(power>0.6?0xFFE03D:0xFFF6E3), 0x140c07);
    hitPost(power, blocked?0x7fb2d6:(w.metal?0xffe6a0:0xff6a1e));
    POST.uniforms.uZoom.value = Math.max(POST.uniforms.uZoom.value, (0.03 + weight*0.12)*bw);
    if(!blocked && T.chef.userData.dHead){
      const rel=ang - T.facing; _lp.set(Math.sin(rel),0,Math.cos(rel));  // local push (inward)
      const dh=T.chef.userData.dHead;
      dh.t=Math.max(dh.t, Math.min(1,power)*dh.max);
      dh.p.set(-_lp.x*0.235, 0, -_lp.z*0.235);   // contact point: attacker-facing side
      dh.n.set(_lp.x, 0, _lp.z);                  // push inward
    }
    if(blocked){ sfx.block(); popWord(cpos,'BLOCK',COL.steel|0? '#7fb2d6':'#fff',22); }
    else {
      w.metal? sfx.clang(0.4+weight) : sfx.thud(0.4+weight);
      if(weight>0.45) sfx.heavy(clamp(weight,0,1));
      if(isPlayer){ hitWord(cpos, heavy, w);
        haptic(0.25 + weight*0.75, 0.35 + weight*0.45, Math.round(55 + weight*280));
        kitchenBump(0.12 + weight*0.4); }
    }
    if(isPlayer){ if(T.hp<=0){ killChef(T, ang); } }
    else { playerHurtFlash(taken); break; } // enemy hits the player once
  }
  // durability
  if(isPlayer && landed && A.wpn!=='fists' && w.dur!==Infinity){
    A.dur -= heavy?2:1;
    if(A.dur<=0){ breakWeapon(A); }
    else updateHUDWeapon();
  }
  if(landed && isPlayer){ addCombo(); GAME.hitsLanded++; }
  if(!landed && isPlayer){ sfx.whiff(); }
}
function hitWord(pos,heavy,w){
  let txt,col,size;
  if(w.key==='castiron'){ txt=pick(['TENDERIZED','SMASHED','CLOBBERED','SEASONED']); col='#ff6a1e'; size=heavy?40:32; }
  else if(w.key==='knife'){ txt=pick(['SKEWERED','POKED','JABBED','JULIENNED']); col='#dfe6ea'; size=heavy?34:26; }
  else if(w.metal){ txt=heavy?pick(['BONK','CLANG','WHACK','SERVED']):pick([' tink','PING','tap','ding']); col='#f4e4c1'; size=heavy?36:24; }
  else { txt=heavy?pick(['CRACK','SMACK','SLAP']):pick(['pop','tap','boop']); col='#f4e4c1'; size=heavy?32:22; }
  if(GAME.combo>=6) { txt=GAME.combo+' HIT COMBO!'; col='#8fc866'; size=40; }
  popWord(pos,txt,col,size);
}
function addCombo(){ GAME.combo++; GAME.comboT=1.4; if(GAME.combo>GAME.maxCombo)GAME.maxCombo=GAME.combo;
  const c=document.getElementById('combo'); const n=document.getElementById('comboN');
  if(GAME.combo>=2){ c.classList.add('on'); n.textContent=GAME.combo;
    n.animate([{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:180}); } }
function breakWeapon(A){
  const w=WEAPONS[A.wpn];
  const hpos=new V3(); A.chef.userData.armR.hand.getWorldPosition(hpos);
  burst(hpos,20,w.metal?0xd8d8d8:0x9a6a3a,1.6); ring(hpos,COL.tomato,1.6); shake(0.6); sfx.break();
  toast(w.name.toUpperCase()+pick([' SHATTERED',' GAVE ITS LIFE FOR THE BIT',' IS NOW GARNISH',' RAGE QUIT',' FILED A COMPLAINT']));
  popWord(hpos,'BROKE!','#ff3b30',30);
  A.wpn='fists'; A.dur=Infinity; equip(A.chef,'fists'); updateHUDWeapon();
}
function killChef(T, ang){
  if(T.dead)return; T.dead=true; T.deadT=0; T.hp=0;
  if(player.grabbed && player.grabbed.by===T){ player.grabbed=null; hideMashUI(); player.iframe=0.4; }
  if(T.hasToken){ T.hasToken=false; tokensUsed--; }
  T.vel.x+=Math.sin(ang)*5; T.vel.z+=Math.cos(ang)*5;
  T._toppleZ=rand(-0.5,0.5);
  buildRagdoll(T); if(T.rag) ragImpulse(T, _rp1.set(Math.sin(ang),0.15,Math.cos(ang)).normalize(), 1.0);
  const p=T.pos.clone(); p.y=1.2; burst(p,16,0xff3b30,1.3); shake(0.5); sfx.down();
  impactFrames(4, 0xff6a1e, 0x140c07); hitPost(0.8, 0xff6a1e); kitchenBump(0.6); haptic(0.7,0.5,140);
  popWord(p,pick(['DOWN','SENT HOME','COMPED','NO TIP FOR YOU','WALKED']),T.kind==='tough'?'#ff6a1e':'#f4e4c1',34);
  GAME.kills++;
  // drop their weapon as a pickup if it wasn't fists (worse-tier flavour: only spatula/pan survive)
  if(T.wpn!=='fists' && Math.random()<0.6){ spawnPickup(T.wpn, T.pos.x, T.pos.z); }
  const alive=enemies.filter(e=>!e.dead).length;
  updateHUDCooks(alive);
  maybeSpawnWave();
}

/* ================================================================ PLAYER */
function updatePlayer(dt, pad){
  const P=player; if(!P) return;
  if(P.dead){ poseChef(P,true,dt); return; }
  if(P.grabbed){ handleGrab(P,dt,pad); poseChef(P,true,dt); return; }
  // ----- squash decay -----
  P._sq=damp(P._sq,0,14,dt);
  // ----- timers -----
  P.comboT=GAME.comboT; if(GAME.comboT>0){ GAME.comboT-=dt; if(GAME.comboT<=0){ GAME.combo=0;
    document.getElementById('combo').classList.remove('on'); } }
  P.weaveCD=Math.max(0,P.weaveCD-dt); P.dodgeCD=Math.max(0,P.dodgeCD-dt); P.chainT=Math.max(0,P.chainT-dt); P.tackleCD=Math.max(0,P.tackleCD-dt);
  P.iframe=Math.max(0,P.iframe-dt); P.stagger=Math.max(0,P.stagger-dt); P.hurt=damp(P.hurt,0,8,dt);

  updateCameraVectors();

  // ----- read input -----
  let ix=0,iz=0;
  if(KEY['w'])iz-=1; if(KEY['s'])iz+=1; if(KEY['a'])ix-=1; if(KEY['d'])ix+=1;
  ix+=pad.move.x; iz+=pad.move.y;
  ix+=TOUCH.moveX; iz+=TOUCH.moveY;
  const mv=new V3(); mv.addScaledVector(camRight, ix); mv.addScaledVector(camFwd, -iz);
  if(mv.lengthSq()>1) mv.normalize();
  const moving=mv.lengthSq()>0.02;

  // camera rotate (L1/R1 unlocked)  |  target switch (locked). keyboard: [ ]
  if((KEY['[']||pad.camL||TOUCH.camL)&&!P.lockOn) CAM.yaw+=2.4*dt;
  if((KEY[']']||pad.camR||TOUCH.camR)&&!P.lockOn) CAM.yaw-=2.4*dt;
  if(P.lockOn){ if(tapK('[')||pad.camL||consume('camLedge')) switchTarget(-1);
                if(tapK(']')||pad.camR||consume('camRedge')) switchTarget(1); }

  // lock-on toggle: R3 / L key / LOCK button
  if(pad.lock||tapK('l')||consume('lockEdge')){ toggleLock(); }
  if(P.lockOn&&(P.lockOn.dead)) P.lockOn=nearestEnemy(P.pos,P.facing,null);

  // ----- guard (hold L2 / hold space / GUARD button) -----
  P.guard = (pad.guard||KEY[' ']||TOUCH.guard) && P.stagger<=0 && !P.attack && !P.dodge;
  P.guardV=damp(P.guardV, P.guard?1:0, 16, dt);

  // ----- weave (right stick / Q,E) -----
  const rs=pad.rstick;
  let weaveDir=0;
  if(Math.abs(rs.x)>0.5) weaveDir=rs.x>0?1:-1;
  if(tapK('e')) weaveDir=1; if(tapK('q')) weaveDir=-1;
  if(weaveDir!==0 && P.weaveCD<=0 && !P.attack && P.stagger<=0 && !P.dodge){
    P.weaveCD=0.45; P.iframe=Math.max(P.iframe,0.22); P._weave=weaveDir; P._weaveT=0.22;
    const side=camRight.clone().multiplyScalar(weaveDir*0.6); P.vel.addScaledVector(side,4);
    sfx.whiff();
  }
  if(P._weaveT>0) P._weaveT-=dt;

  // ----- dodge (dir + R2 / Shift) -----
  const wantDodge=(pad.dodge&&(Math.abs(pad.move.x)+Math.abs(pad.move.y)>0.3))||tapK('shift')||consume('dodgeEdge');
  if(wantDodge && P.dodgeCD<=0 && P.stagger<=0){
    let ddir=mv.clone(); if(ddir.lengthSq()<0.02){ ddir.copy(camFwd).multiplyScalar(-1); }
    ddir.normalize();
    P.dodge={ t:0, dur:0.34, dir:ddir }; P.dodgeCD=0.6; P.iframe=0.3; P.attack=null;
    sfx.step();
  }

  // ----- GRAB: pick up a utensil you're standing on, else tackle-charge a person -----
  if(pad.pickup||tapK('f')||consume('pickupEdge')){
    if(nearPickup && Math.hypot(nearPickup.x-P.pos.x, nearPickup.z-P.pos.z)<1.0) tryPickup();
    else startTackle(P);
  }

  // ----- attacks (Cross light / Square heavy / touch) -----
  const wantLight=pad.light||tapK('j')||MOUSE.l||consume('lightEdge'); MOUSE.l=false;
  const wantHeavy=pad.heavy||tapK('k')||MOUSE.r||consume('heavyEdge'); MOUSE.r=false;
  if((wantLight||wantHeavy) && !P.dodge && !P.tackle && P.stagger<=0){
    // recovery-cancel: once a swing has connected you can chain straight into the next
    const canStart = !P.attack || (P.attack.hit && P.attack.t >= P.attack.hitAt + 0.03);
    if(canStart){
      let tgt=P.lockOn||nearestEnemy(P.pos,P.facing,1.1)||nearestEnemy(P.pos,P.facing,null);
      if(tgt){ const dx=tgt.pos.x-P.pos.x,dz=tgt.pos.z-P.pos.z; P.attackAim=Math.atan2(dx,dz); }
      else P.attackAim=P.facing;
      P.comboStep=(P.chainT>0)?(P.comboStep+1):0;   // cycle the swing shape
      P.attack=null;                                 // clear the one we're canceling
      startAttack({ actor:P, wpn:P.wpn, heavy:wantHeavy, target:tgt, isPlayer:true });
      if(P.attack){ P.attack.aim=P.attackAim; P.chainT=P.attack.dur+0.4; }
    }
  }

  // ----- integrate attack -----
  if(P.attack){
    const A=P.attack; A.t+=dt;
    // snap facing to aim
    P.facing=angLerp(P.facing, A.aim!=null?A.aim:P.facing, Math.min(1,dt*18));
    if(!A.hit && A.t>=A.hitAt){ A.hit=true; P.facing=A.aim!=null?A.aim:P.facing;
      P.actorSync(); resolveHit(P,true); }
    if(A.t>=A.dur){ P.attack=null; }
  }

  // ----- movement integrate -----
  let spd=6.7;
  if(P.guard) spd*=0.42;
  if(P.attack) spd*=0.14;
  if(P.tackle){
    const T=P.tackle; T.t+=dt; const k=1-T.t/T.dur;
    P.vel.x=T.dir.x*13*(0.5+k*0.5); P.vel.z=T.dir.z*13*(0.5+k*0.5);
    if(!T.hit){                                 // slam the first person we plow into
      for(const e of enemies){ if(e.dead)continue;
        if(Math.hypot(e.pos.x-P.pos.x,e.pos.z-P.pos.z) < e.r+P.r+0.35){ tackleEnemy(P,e); T.hit=true; break; } }
    }
    if(T.t>=T.dur) P.tackle=null;
  } else if(P.dodge){
    const D=P.dodge; D.t+=dt; const k=1-D.t/D.dur;
    P.vel.x=D.dir.x*11*k; P.vel.z=D.dir.z*11*k;
    if(D.t>=D.dur) P.dodge=null;
  } else if(P.stagger<=0){
    P.vel.x=damp(P.vel.x, mv.x*spd, 18, dt);
    P.vel.z=damp(P.vel.z, mv.z*spd, 18, dt);
  } else {
    P.vel.multiplyScalar(Math.exp(-6*dt));
  }
  P.pos.addScaledVector(P.vel,dt);
  collide(P.pos,P.r);

  // facing while roaming
  if(!P.attack && !P.lockOn && moving && !P.dodge && !P.tackle) P.facing=angLerp(P.facing, Math.atan2(mv.x,mv.z), Math.min(1,dt*12));
  if(P.lockOn && !P.dead){ const dx=P.lockOn.pos.x-P.pos.x,dz=P.lockOn.pos.z-P.pos.z;
    if(!P.attack) P.facing=angLerp(P.facing, Math.atan2(dx,dz), Math.min(1,dt*10)); }
  if(P.dodge) { /* keep facing */ }

  P.speed=Math.hypot(P.vel.x,P.vel.z);
  P.movePhase+=dt*P.speed*2.4;

  poseChef(P, true, dt);
  // prompt for nearby pickup
  updatePrompt();
}

/* ================================================================ ENEMY AI */
const ATTACK_TOKENS=3; let tokensUsed=0;
function updateEnemy(e, dt){
  e._sq=damp(e._sq,0,14,dt);
  if(e.dead){ // ragdoll (or spring-topple fallback) + fade/remove
    e.deadT+=dt;
    e.chef.position.copy(e.pos); e.chef.rotation.y=e.facing;   // frame for world<->local
    if(e.deadT<1.6) updateDead(e, dt);
    if(e.deadT>1.6){ const s=clamp(1-(e.deadT-1.6)/0.7,0,1); e.chef.scale.setScalar(s*(e.kind==='tough'?1.12:1)); }
    if(e.deadT>2.3){ scene.remove(e.chef); e._remove=true; }
    return;
  }
  e.hurt=damp(e.hurt,0,8,dt);
  e.stagger=Math.max(0,e.stagger-dt);

  const toP=new V3(player.pos.x-e.pos.x,0,player.pos.z-e.pos.z);
  const dist=toP.length(); const dirP=toP.clone().normalize();
  let wantYaw=Math.atan2(dirP.x,dirP.z);
  e._fetching=false;

  if(e.stagger>0){
    e.vel.multiplyScalar(Math.exp(-5*dt));
    e.pos.addScaledVector(e.vel,dt); collide(e.pos,e.r);
    if(e.hasToken){ e.hasToken=false; tokensUsed--; } e.attack=null;
    if(player.grabbed && player.grabbed.by===e){ player.grabbed=null; hideMashUI(); }
    e.state='engage'; e.stateT=Math.max(e.stateT, e.stagger+0.05);   // re-engage once we shake it off
    syncEnemyMesh(e,dt,wantYaw); return;
  }

  e.stateT-=dt;
  let move=new V3();
  const reach=WEAPONS[e.wpn].reach;
  const _tang=new V3(-dirP.z,0,dirP.x);   // strafe axis (perp to player)
  if(e.state==='spawn'){ if(e.stateT<=0){
    if(e.wpn==='fists' && Math.random()<0.8){ const p=nearestFreePickup(e); if(p){ e.grabTarget=p; e.state='fetch'; } else e.state='engage'; }
    else e.state='engage';
  } }
  else if(e.state==='fetch'){                            // run for a utensil on the floor

    else if(e.stateT<=0){

/* ================================================================ POSE */
/* rotation-driven posing for both player & enemy. `a` is the actor object. */
function poseChef(a, isPlayer, dt){
  const c=a.chef, u=c.userData, b=u.body, up=u.upper;
  c.position.copy(a.pos); c.rotation.y=a.facing;
  if(!a._an) a._an={ idle:Math.random()*10, twist:0, sway:0, toqueX:0,toqueXv:0, rx:0,rxv:0, rz:0,rzv:0, prevPh:a.movePhase||0 };

  // full-body RUN blend — player only, when moving fast and not busy
  const rk=((isPlayer||a._fetching) && !a.attack && !a.guard && !a.dodge && !a.tackle) ? clamp((spd-2.3)/3.4,0,1) : 0;
  a._runK = rk*rk*(3-2*rk);
  a._idleK = (!a.attack && !a.guard && !a.dodge && !a.dead) ? clamp(1-spd/0.9,0,1) : 0;

  if(a.dead){ updateDead(a,dt); return; }
  if(!a._feet) resetFeet(a);

  // ---- attack envelope (shared by body + arms) ----
  let atk=null;
  if(a.attack){
    const A=a.attack, w2=WEAPONS[A.wpn];
    const windK=clamp(A.t/A.wind,0,1);
    const strikeK=clamp(Math.max(0,A.t-A.wind)/(A.active+A.rec*0.55),0,1);
    const heavyMul = w2.cls==='heavy'?1.5 : w2.cls==='medium'?1.18 : 1;
    atk={ A, w2, windK, strikeK, heavyMul, thrust:!!w2.thrust };
  }

  // ---- footwork: feet plant in world space, step to catch up ----
  updateFeet(a, dt, moving);

  // ---- recoil springs (impact) ----
  AN.rxv += (-95*AN.rx - 13*AN.rxv)*dt; AN.rx += AN.rxv*dt;
  AN.rzv += (-95*AN.rz - 13*AN.rzv)*dt; AN.rz += AN.rzv*dt;

  // ---- weight shift: lean onto the planted foot; bob with the step ----
  const idleK=a._idleK||0;

  // ---- spine (waist joint): the upper body flexes forward and undulates ----
  let waist=0;
  if(moving && !atk) waist += Math.min(1,spd/5)*0.14;
  waist += (a._runK||0)*0.34;                            // drive forward into the run
  if(moving) waist += Math.sin(ph*2)*0.035*Math.min(1,spd/4);  // stride undulation
  if(atk){ waist += lerp(0,-0.10,atk.windK); waist = lerp(waist, (atk.A.shape?atk.A.shape.lean:0.28)*atk.heavyMul*0.75, atk.strikeK); }
  if(a.tackle){ waist += 0.5; }                          // shoulder-down charge
  u.spine.rotation.x = damp(u.spine.rotation.x, waist, 16, dt);
  u.abMesh.rotation.x = damp(u.abMesh.rotation.x, -waist*0.22, 11, dt);   // belly counter-curves (an S-spine)

  // ---- squash / stretch ----
  const sq=a._sq||0;

  b.scale.set(1+sq*0.5-stretch*0.5, 1-sq*0.6+stretch*0.85, 1+sq*0.5-stretch*0.5);

  // ---- upper-body twist: gait counter-rotation + swing drive ----
  let twist = AN.sway*0.4;
  if(moving && !atk) twist += -Math.sin(ph)*0.13*Math.min(1,spd/4);
  if(atk){
    const S=atk.A.shape||SWINGS[0];
    twist = lerp(0, S.coil*atk.heavyMul, atk.windK);
    twist = lerp(twist, S.follow*atk.heavyMul, atk.thrust?atk.strikeK*0.4:atk.strikeK);

  up.rotation.y = AN.twist;
  u.hips.rotation.y = damp(u.hips.rotation.y, -AN.twist*0.35, 12, dt);

  // ---- toque secondary motion ----

  u.toque.rotation.x = AN.toqueX*0.5 + 0.02*Math.sin(t*2.1);
  u.toque.rotation.z = -b.rotation.z*0.5;
  u.head.rotation.x = damp(u.head.rotation.x, AN.rx*0.6 - (a.hurt>0.3?0.2*a.hurt:0) + (a._runK||0)*0.32, 14, dt);

  solveLegsIK(a, b);

  u.mats.jacket.emissive.setHex(0xff3b30); u.mats.jacket.emissiveIntensity=e*0.5;

}

/* plant both feet at the stance, in world space */
function resetFeet(a){
  a._feet=true; const legs=a.chef.userData.legs;
  for(let i=0;i<2;i++){ const st=STANCE[i]; toGround(a,st.x,st.z,legs[i].world); legs[i].stepT=1; legs[i].lift=0; }

const _ideal=new V3();
function updateFeet(a, dt, moving){
  const legs=a.chef.userData.legs;
  a._stepCool=(a._stepCool||0)-dt;
  const spd=a.speed||0, run=a._runK||0;
  const vx=a.vel?a.vel.x:0, vz=a.vel?a.vel.z:0, vm=Math.hypot(vx,vz)||1;

  const stepLen = 0.19 + run*0.17;                       // longer strides at a run

    if(spd>0.3){ _ideal.x += vx/vm*lead; _ideal.z += vz/vm*lead; }
    if(L.stepT>=1){
      const off=Math.hypot(L.world.x-_ideal.x, L.world.z-_ideal.z);
      if(off>stepLen && (!anyStepping || fast) && a._stepCool<=0){
        L.from.copy(L.world); L.to.copy(_ideal);
        L.stepT=0; a._stepCool = fast?0.02:0.05; anyStepping=true;

    } else {
      L.stepT=Math.min(1, L.stepT + dt/stepDur);
      const tt=L.stepT; L.world.lerpVectors(L.from,L.to, tt*tt*(3-2*tt));
      L.lift=Math.sin(tt*Math.PI)*(0.06+Math.min(0.07,spd*0.012)+run*0.15); L.world.y=L.lift; if(tt>=1){ L.lift=0; L.world.y=0; }

  a._stepDip = stepPhase>=0 ? Math.sin(stepPhase*Math.PI)*0.02 : 0;

const _hipV=new V3(), _footV=new V3();
function solveLegsIK(a, b){
  const legs=a.chef.userData.legs, inv=1/(a.chef.scale.x||1);

const _bnd2=new V3(), _fdir=new V3();

    A.tgt.x=damp(A.tgt.x,tx,rate,dt); A.tgt.y=damp(A.tgt.y,ty,rate,dt); A.tgt.z=damp(A.tgt.z,tz,rate,dt);

    chest: ragPt(u.upper.localToWorld(new V3(0,1.55,0)), 0.30*s),
    hipC:  ragPt(a.chef.localToWorld(new V3(0,0.85,0)), 0.26*s),
    shL:ragPt(shW(0),0.15*s), shR:ragPt(shW(1),0.15*s),
    hipL:ragPt(hipW(0),0.14*s), hipR:ragPt(hipW(1),0.14*s),

  link('chest','shL'); link('chest','shR'); link('shL','shR',0.9);
  link('chest','hipC',0.95); link('hipC','hipL'); link('hipC','hipR'); link('hipL','hipR',0.9);
  link('shL','hipL',0.7); link('shR','hipR',0.7); link('shL','hipR',0.5); link('shR','hipL',0.5);
  link('shL','elbL'); link('elbL','hanL'); link('shR','elbR'); link('elbR','hanR');
  link('hipL','kneL'); link('kneL','fooL'); link('hipR','kneR'); link('kneR','fooR');

function ragImpulse(a, dir, power){
  const R=a.rag; if(!R) return;
  [['head',1],['chest',0.55],['shL',0.4],['shR',0.4]].forEach(h=>{ const pt=R.pts[h[0]];

function ragTick(a, dt){ const R=a.rag; if(!R) return; R.acc+=dt; let g=0;
  while(R.acc>=RAG_STEP && g++<8){ R.acc-=RAG_STEP; ragStep(a, RAG_STEP); } }
function ragStep(a, dt){
  const R=a.rag, list=R.list;
  for(const q of list){ _rgv.subVectors(q.p,q.o).multiplyScalar(RAG.damp); q.o.copy(q.p); q.p.add(_rgv); q.p.y+=RAG.grav*dt*dt; }
  for(let it=0; it<RAG.iters; it++){
    for(const c of R.cons){ _rgv.subVectors(c.b.p,c.a.p); const d=_rgv.length(); if(d<1e-6) continue;
      const diff=(d-c.len)/d*0.5*c.k; c.a.p.addScaledVector(_rgv,diff); c.b.p.addScaledVector(_rgv,-diff); }
    for(const q of list){ if(q.p.y<q.r){ q.p.y=q.r; q.o.x+=(q.p.x-q.o.x)*RAG.friction; q.o.z+=(q.p.z-q.o.z)*RAG.friction; }
      q.p.x=clamp(q.p.x,-HALFW+0.3,HALFW-0.3); q.p.z=clamp(q.p.z,-HALFD+0.3,HALFD-0.3); }

// Discrete numbered waves: cfg.waves is still one flat kind list (the seam's
// documented contract), sliced into per-wave chunks by cfg.waveSizes (e.g.
// [3,4,5,6,7]). A wave's chunk only starts spawning once the previous chunk
// is fully spawned AND cleared, with a short announced rest between them.
// Omitting waveSizes collapses to one chunk = the whole list, i.e. the
// original single-wave trickle, so any caller not passing it is unaffected.
const WAVE={ spawned:0, done:false };
function spawnEnemy(kind){
  // spawn at a random edge, away from player
  let x,z,tries=0;
  do{ const side=(Math.random()*4)|0;
    if(side===0){x=rand(-HALFW+1,HALFW-1);z=-HALFD+1.2;}
    else if(side===1){x=rand(-HALFW+1,HALFW-1);z=HALFD-1.2;}
    else if(side===2){x=-HALFW+1.2;z=rand(-HALFD+1,HALFD-1);}
    else {x=HALFW-1.2;z=rand(-HALFD+1,HALFD-1);}
    tries++;
  } while(Math.hypot(x-player.pos.x,z-player.pos.z)<4 && tries<10);
  const e=makeEnemy(kind,new V3(x,0,z)); enemies.push(e);
  // little poof
  const p=new V3(x,1.2,z); burst(p,6,COL.cream,0.7);
  return e;
}
function chunkWaves(list, sizes){
  sizes = (sizes && sizes.length) ? sizes : [list.length];
  const chunks=[]; let idx=0;
  for(const size of sizes){ chunks.push(list.slice(idx, idx+Math.max(0,size))); idx+=size; }
  // sizes summing short of the full list would silently drop enemies — fold
  // any leftover into one more wave instead.
  if(idx<list.length) chunks.push(list.slice(idx));
  return chunks;
}
function updateHUDWave(){
  const el=document.getElementById('waveL'); if(!el) return;
  el.textContent = WAVE.chunks && WAVE.chunks.length>1
    ? 'WAVE '+(WAVE.wave+1)+' / '+WAVE.chunks.length : '';
}
function spawnWaveChunk(delay){
  const first=Math.min(4, WAVE.total);
  WAVE.pending=first;
  for(let i=0;i<first;i++){ setTimeout(()=>{ WAVE.pending=Math.max(0,(WAVE.pending||1)-1);
    spawnEnemy(WAVE.queue[WAVE.spawned]||'weak'); WAVE.spawned++;
    if(WAVE.spawned>=WAVE.total) WAVE.waveDone=true;
    updateHUDCooks(enemies.filter(e=>!e.dead).length); }, delay+i*350); }
}

  toast('WAVE '+nextWave+' / '+WAVE.chunks.length+(flavor?' \u2014 '+flavor:''));
  setTimeout(()=>{
    WAVE.resting=false; WAVE.wave++;
    WAVE.queue=WAVE.chunks[WAVE.wave]; WAVE.total=WAVE.queue.length;
    WAVE.spawned=0; WAVE.waveDone=false; WAVE.pending=0;
    spawnWaveChunk(200);
    updateHUDWave();
  }, 2200);
}
function maybeSpawnWave(){
  if(WAVE.resting) return;
  const alive=enemies.filter(e=>!e.dead).length;
  const inflight=WAVE.pending||0;
  if(!WAVE.waveDone){
    if(alive<=2 && (WAVE.spawned+inflight)<WAVE.total){
      const n=Math.min(2, WAVE.total-WAVE.spawned-inflight);
      for(let i=0;i<n;i++){ WAVE.pending=(WAVE.pending||0)+1;
        setTimeout(()=>{ WAVE.pending=Math.max(0,(WAVE.pending||1)-1);
          spawnEnemy(WAVE.queue[WAVE.spawned]||'weak'); WAVE.spawned++;
          updateHUDCooks(enemies.filter(e=>!e.dead).length);
          if(WAVE.spawned>=WAVE.total) WAVE.waveDone=true; }, i*450); }
    }
    return;
  }
  // this wave's queue is fully spawned — advance once the room is actually clear
  if(alive>0 || inflight>0) return;
  if(WAVE.wave+1>=WAVE.chunks.length){ WAVE.done=true; return; }
  startNextWave();
}

/* ================================================================ NIGHT (the seam) */
/* startNight(cfg,onEnd): cfg = { larder:[{key,x,z}], waves:[kind...],
   waveSizes:[n...]?, player:{wpn} }
   waveSizes splits the flat `waves` list into numbered waves (e.g. [3,4,5,6,7]
   for 5 escalating waves) with a rest + HUD/toast announcement between each.
   Omit it for the original single continuous wave.
   onEnd(result): result = { survived:bool, kills, maxCombo, wpn } */
function startNight(cfg, onEnd){
  // clear
  for(const e of enemies) scene.remove(e.chef); enemies.length=0;
  for(const p of PICKUPS) scene.remove(p.g); PICKUPS.length=0;
  tokensUsed=0;
  GAME.kills=0; GAME.combo=0; GAME.maxCombo=0; GAME.hitsLanded=0; GAME.onEnd=onEnd;
  // player
  if(!player){ player=makePlayer(); attachPlayerHelpers(player); }
  player.pos.set(0,0,2.5); player.vel.set(0,0,0); player.facing=Math.PI; player.hp=player.hpMax; player._feet=false;
  player.wpn=cfg.player&&cfg.player.wpn||'fists'; player.dur=WEAPONS[player.wpn].dur; equip(player.chef,player.wpn);
  player.dead=false; player.attack=null; player.dodge=null; player.lockOn=null;
  player.grabbed=null; hideMashUI(); grabCD=0; player.tackle=null; player.tackleCD=0;
  resetRagPose(player);
  player._feet=null; player.vel.set(0,0,0);
  CAM.yaw=Math.PI; CAM.lockK=0;
  // larder
  for(const it of cfg.larder) spawnPickup(it.key,it.x,it.z);
  // waves
  WAVE.chunks=chunkWaves(cfg.waves, cfg.waveSizes);
  WAVE.wave=0; WAVE.resting=false; WAVE.done=false; WAVE.winT=0;
  WAVE.queue=WAVE.chunks[0]; WAVE.total=WAVE.queue.length; WAVE.spawned=0; WAVE.waveDone=false; WAVE.pending=0;
  spawnWaveChunk(300);
  updateHUDCooks(Math.min(4,WAVE.total));
  updateHUDWave();
  updateHUDHealth(); updateHUDWeapon();
  GAME.mode='play';
  document.getElementById('hud').classList.add('on');
  if(TOUCHCAP) touchEl.classList.add('on');
  document.getElementById('veil').classList.add('hide');
  document.getElementById('hint').classList.add('on');
}
let ended=false;
function endNight(survived){
  if(ended)return; ended=true; GAME.mode='over';
  const res={ survived, kills:GAME.kills, maxCombo:GAME.maxCombo, wpn:player.wpn };
  if(GAME.onEnd) GAME.onEnd(res);
  document.getElementById('hint').classList.remove('on');
  showEnd(res);
}

/* ================================================================ CARDS */
function showTitle(){
  GAME.mode='title';
  document.getElementById('card').innerHTML =
    '<div class="kick">AFTER HOURS · THE PATRONS CAME BACK, AND THEY WANT A REFUND</div>'+
    '<div class="title">SHORT<br><span class="b">ORDER</span></div>'+
    '<div class="sub">The dinner rush is over. They\u2019re not. Grab whatever\u2019s on the pass \u2014 '+
    'a spatula, a nonstick, the cast iron if HR isn\u2019t around \u2014 and clear the line. '+
    'Everything breaks. Everything is heavy in its own way. Tips are not guaranteed.</div>'+
    '<button class="btn" id="playBtn">STEP TO THE PASS</button>'+
    '<div id="ctrls">'+ctrlRows()+'</div>';
  document.getElementById('playBtn').onclick=()=>{ audioInit(); if(AC&&AC.state==='suspended')AC.resume(); ended=false; startNight(SLICE, onNightEnd); };
  document.getElementById('veil').classList.remove('hide');
  touchEl.classList.remove('on');
}
function ctrlRows(){
  const rows=[
    ['Move','Left stick / WASD','pad'],
    ['Light attack','Cross / J','pad'],
    ['Heavy attack','Square / K','pad'],
    ['Pick up weapon','Triangle / F','pad'],
    ['Guard','L2 / Space','pad'],
    ['Weave','Right stick / Q E','pad'],
    ['Dash','R2 + stick / Shift','pad'],
    ['Rotate camera','L1 R1 / [ ]','pad'],
    ['Lock-on','R3 / L','pad'],
    ['Switch target','L1 R1 (locked)','pad'],
  ];
  return rows.map(r=>'<div class="r"><span>'+r[0]+'</span><b class="'+(r[2]||'')+'">'+r[1]+'</b></div>').join('');
}
function showEnd(res){
  const c=document.getElementById('card');
  document.getElementById('veil').classList.remove('hide');
  document.getElementById('hud').classList.remove('on');
  touchEl.classList.remove('on');
  const win=res.survived;
  c.innerHTML='<div class="card end '+(win?'win':'lose')+'">'+
    '<div class="kick">'+(win?pick(['THE LINE IS CLEAN','FIVE STARS ON YELP','THE HEALTH INSPECTOR IS IMPRESSED','MICHELIN CALLED']):pick(['YOU WENT DOWN','ONE STAR: "FOOD WAS FINE, STAFF ATTACKED US"','THE CUSTOMER WAS RIGHT THIS TIME','SENT HOME EARLY']))+'</div>'+
    '<div class="title">'+(win?'KITCHEN<br>CLEARED':'86\u2019D')+'</div>'+
    '<div class="stat">Cooks put down <b>'+res.kills+'</b> &nbsp;·&nbsp; Best combo <b>'+res.maxCombo+'</b>'+
    (win?'':'<br>Last weapon in hand: <b>'+WEAPONS[res.wpn].name+'</b>')+'</div>'+
    '<button class="btn" id="againBtn">'+(win?'ANOTHER NIGHT':'BACK ON THE LINE')+'</button></div>';
  document.getElementById('againBtn').onclick=()=>{ ended=false; startNight(SLICE, onNightEnd); };
}
function onNightEnd(res){ /* the seam hands the cooking-loop layer a result here */ }

/* the hardcoded test night for this slice */
const SLICE={
  player:{ wpn:'fists' },
  larder:[
    {key:'spatula', x:-3.6,z:3.0}, {key:'spatula', x:3.6,z:3.0},
    {key:'nonstick', x:0,z:3.2},
    {key:'castiron', x:-7.4,z:3.6},        // over by the far prep station — go get it
    {key:'knife', x:7.5,z:4.5},
    {key:'potlid', x:5.5,z:-4.5}
  ],
  waveSizes: [3,4,5,6,7],
  waves:[
    'weak','weak','weak',                                   // wave 1
    'weak','weak','weak','tough',                            // wave 2
    'weak','weak','tough','weak','tough',                    // wave 3
    'weak','tough','weak','tough','weak','tough',             // wave 4
    'tough','weak','tough','weak','tough','weak','tough'      // wave 5
  ]
};

/* ================================================================ LOOP */
let last=performance.now()/1000;
function tick(){
  requestAnimationFrame(tick);
  let now=performance.now()/1000; let dt=Math.min(0.05, now-last); last=now;
  GAME.t+=dt;

  const pad=pollPad();
  if(pad.start && GAME.mode==='play'){ /* pause hook (omitted in slice) */ }

  // hitstop freezes sim but not render
  let sdt=dt;
  if(FX.hitstop>0){ FX.hitstop-=dt; sdt=0.0001; }

  if(GAME.mode==='play'){
    updatePlayer(sdt, pad);
    for(const e of enemies) updateEnemy(e, sdt);
    // reap
    for(let i=enemies.length-1;i>=0;i--) if(enemies[i]._remove) enemies.splice(i,1);
    // win: all waves spawned and nobody left standing (frame-timed so it can't be missed)
    if(!ended && WAVE.done && enemies.every(e=>e.dead)){
      WAVE.winT=(WAVE.winT||0)+dt;
      if(WAVE.winT>0.7) endNight(true);
    } else WAVE.winT=0;
  } else {
    // idle breathing on title
    if(player){ poseChef(player,true,dt); }
  }

  sparkTick(dt); ringTick(dt); kitchenTick(dt); grabCD=Math.max(0,grabCD-dt);
  // pickup bobbing
  for(const p of PICKUPS){ if(p.taken)continue; p.g.position.y=p.y0+Math.sin(GAME.t*2+p.x)*0.08; p.g.rotation.y+=dt*1.2;
    p.disc.material.opacity=0.18+Math.sin(GAME.t*4+p.z)*0.08; }
  // stove flicker
  const flames=arena.userData.stoveFlames||[];
  for(const f of flames){ f.scale.y=1+Math.sin(GAME.t*18+f.userData.b)*0.15; f.material.emissiveIntensity=1.8+Math.sin(GAME.t*22+f.userData.b)*0.6; }
  stoveGlow.intensity=0.8+Math.sin(GAME.t*16)*0.2;

  updateCamera(dt);
  postTick(dt);
  renderer.setRenderTarget(rt); renderer.clear(); renderer.render(scene,camera);
  renderer.setRenderTarget(null); renderer.render(postScene, postCam);
}

function updateCamera(dt){
  updateCameraVectors();
  const P=player;
  const target = P? P.pos : new V3();
  const locked = !!(P && P.lockOn && !P.lockOn.dead);
  CAM.lockK = damp(CAM.lockK, locked?1:0, 5, dt);
  const k = CAM.lockK;

  // LOCK-ON: swing the camera BEHIND the player along the player->target axis,
  // so you're looking over his shoulder AT the enemy. (This used to use the
  // reverse vector, which parked the lens on the far side facing back at you.)
  if(locked){
    const t=P.lockOn.pos;
    const desired=Math.atan2(t.x-P.pos.x, t.z-P.pos.z);
    CAM.yaw=angLerp(CAM.yaw, desired, Math.min(1,dt*7));
    updateCameraVectors();                       // re-derive fwd/right after the swing
  }

  let look=target.clone(); look.y=1.4;
  let want=CAM.pos.clone();
  const dir=camFwd.clone().multiplyScalar(-1); // player -> camera
  // trail behind the player, but SHORTEN the distance so the camera can never
  // sit outside the room (which would just show the back of a wall).
  const mx=HALFW-0.6, mz=HALFD-0.6;
  let dist=CAM.dist*(1-0.34*k);                  // pull in tight when locked
  if(dir.x>1e-4) dist=Math.min(dist,(mx-target.x)/dir.x);
  else if(dir.x<-1e-4) dist=Math.min(dist,(-mx-target.x)/dir.x);
  if(dir.z>1e-4) dist=Math.min(dist,(mz-target.z)/dir.z);
  else if(dir.z<-1e-4) dist=Math.min(dist,(-mz-target.z)/dir.z);
  dist=Math.max(2.0,dist);
  want.copy(target).addScaledVector(dir,dist);
  want.addScaledVector(camRight, 0.95*k);        // over the shoulder: slide off-centre
  want.y=CAM.height - 0.55*k;                    // drop toward head height
  if(locked){
    // frame BOTH of you: sit the aim between the pair, biased at the enemy
    const t=P.lockOn.pos;
    const fl=new V3(lerp(P.pos.x,t.x,0.42), 1.45, lerp(P.pos.z,t.z,0.42));
    fl.addScaledVector(camRight, 0.42);          // keep the player from sliding off-frame
    look.lerp(fl, k);
  } else if(P){
    const ne=nearestEnemy(P.pos,P.facing,null);
    if(ne){ look.lerp(new V3(ne.pos.x,1.4,ne.pos.z),0.12); }
  }
  CAM.pos.lerp(want, Math.min(1,dt*(7+3*k)));
  CAM.pos.x=clamp(CAM.pos.x,-mx,mx); CAM.pos.z=clamp(CAM.pos.z,-mz,mz);
  // trauma shake
  FX.trauma=Math.max(0,FX.trauma-dt*2.4);
  const s=FX.trauma*FX.trauma;
  camera.position.copy(CAM.pos);
  camera.position.x+=(Math.random()-0.5)*s*0.7;
  camera.position.y+=(Math.random()-0.5)*s*0.55;
  camera.position.z+=(Math.random()-0.5)*s*0.7;
  CAM.look.lerp(look, Math.min(1,dt*9));
  _shl.copy(CAM.look);
  _shl.x+=(Math.random()-0.5)*s*0.28; _shl.y+=(Math.random()-0.5)*s*0.24;   // jitter the aim too — reads as a harder hit
  camera.lookAt(_shl);
  camera.rotation.z+=(Math.random()-0.5)*s*0.095;
  camera.fov=lerp(camera.fov, 55 - 7*k + s*5, Math.min(1,dt*7));   // zoom in on lock
  camera.updateProjectionMatrix();
}

addEventListener('resize',layout); addEventListener('orientationchange',layout); layout();

/* boot */
showTitle();
// a gentle idle so the title screen isn't empty: place player on the pass
if(!player){ player=makePlayer(); attachPlayerHelpers(player); }
player.pos.set(0,0,2); player.facing=Math.PI;
CAM.pos.set(0,3.2,6.5); CAM.look.set(0,1.4,2);
tick();
</script>
