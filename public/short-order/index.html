/* ================================================================ WAVES */
// Discrete numbered waves: cfg.waves is still one flat kind list (the seam's
// documented contract), sliced into per-wave chunks by cfg.waveSizes (e.g.
// [3,4,5,6,7]). A wave's chunk only starts spawning once the previous chunk
// is fully spawned AND cleared, with a short announced rest between them.
// Omitting waveSizes collapses to one chunk = the whole list, i.e. the
// original single-wave trickle, so any caller not passing it is unaffected.
const WAVE={ spawned:0, done:false };
function spawnEnemy(kind,forceSide){
  // spawn at a random edge, away from player -- forceSide pins it to one
  // wall instead (side 1 = the front wall / dining-room entrance), used for
  // wave 1's "race to the pass" opening so the whole first wave charges in
  // from one direction instead of trickling from all four walls at once.
  let x,z,tries=0;
  do{ const side=forceSide!=null?forceSide:(Math.random()*4)|0;
    if(side===0){x=rand(-HALFW+1,HALFW-1);z=-HALFD+1.2;}
    else if(side===1){x=rand(-HALFW+1,HALFW-1);z=HALFD-1.2;}
    else if(side===2){x=-HALFW+1.2;z=rand(-HALFD+1,HALFD-1);}
    else {x=HALFW-1.2;z=rand(-HALFD+1,HALFD-1);}
    tries++;
  } while(Math.hypot(x-player.pos.x,z-player.pos.z)<4 && tries<10);
  const e=makeEnemy(kind,new V3(x,0,z)); enemies.push(e);
  // little poof
  const p=new V3(x,1.2,z); burst(p,6,COL.cream,0.7);
  return e;
}
function chunkWaves(list, sizes){
  sizes = (sizes && sizes.length) ? sizes : [list.length];
  const chunks=[]; let idx=0;
  for(const size of sizes){ chunks.push(list.slice(idx, idx+Math.max(0,size))); idx+=size; }
  // sizes summing short of the full list would silently drop enemies — fold
  // any leftover into one more wave instead.
  if(idx<list.length) chunks.push(list.slice(idx));
  return chunks;
}
function updateHUDWave(){
  const el=document.getElementById('waveL'); if(!el) return;
  el.textContent = WAVE.chunks && WAVE.chunks.length>1
    ? 'WAVE '+(WAVE.wave+1)+' / '+WAVE.chunks.length : '';
}
function spawnWaveChunk(delay){
  const first=Math.min(4, WAVE.total);
  WAVE.pending=first;
  const side=WAVE.wave===0?1:null;   // wave 1 only: everyone enters from the front wall
  for(let i=0;i<first;i++){ setTimeout(()=>{ WAVE.pending=Math.max(0,(WAVE.pending||1)-1);
    spawnEnemy(WAVE.queue[WAVE.spawned]||'weak',side); WAVE.spawned++;
    if(WAVE.spawned>=WAVE.total) WAVE.waveDone=true;
    updateHUDCooks(enemies.filter(e=>!e.dead).length); }, delay+i*350); }
}
function startNextWave(){
  WAVE.resting=true; updateHUDWave();
  const nextWave=WAVE.wave+2;
  toast('WAVE '+nextWave+' / '+WAVE.chunks.length);   // just the number -- flavor line dropped
  setTimeout(()=>{
    WAVE.resting=false; WAVE.wave++;
    WAVE.queue=WAVE.chunks[WAVE.wave]; WAVE.total=WAVE.queue.length;
    WAVE.spawned=0; WAVE.waveDone=false; WAVE.pending=0;
    spawnWaveChunk(200);
    updateHUDWave();
  }, 2200);
}
function maybeSpawnWave(){
  if(WAVE.resting) return;
  const alive=enemies.filter(e=>!e.dead).length;
  const inflight=WAVE.pending||0;
  if(!WAVE.waveDone){
    if(alive<=2 && (WAVE.spawned+inflight)<WAVE.total){
      const n=Math.min(2, WAVE.total-WAVE.spawned-inflight);
      const side=WAVE.wave===0?1:null;
      for(let i=0;i<n;i++){ WAVE.pending=(WAVE.pending||0)+1;
        setTimeout(()=>{ WAVE.pending=Math.max(0,(WAVE.pending||1)-1);
          spawnEnemy(WAVE.queue[WAVE.spawned]||'weak',side); WAVE.spawned++;
          updateHUDCooks(enemies.filter(e=>!e.dead).length);
          if(WAVE.spawned>=WAVE.total) WAVE.waveDone=true; }, i*450); }
    }
    return;
  }
  // this wave's queue is fully spawned — advance once the room is actually clear
  if(alive>0 || inflight>0) return;
  if(WAVE.wave+1>=WAVE.chunks.length){ WAVE.done=true; return; }
  startNextWave();
}

/* ================================================================ NIGHT (the seam) */
/* startNight(cfg,onEnd): cfg = { larder:[{key,x,z,y?}], waves:[kind...],
   waveSizes:[n...]?, player:{wpn,pos:{x,z}?,facing?} }
   waveSizes splits the flat `waves` list into numbered waves (e.g. [3,4,5,6,7]
   for 5 escalating waves) with a rest + HUD/toast announcement between each.
   Omit it for the original single continuous wave.
   player.pos/facing default to the front-of-pass spot facing the kitchen,
   for callers that don't care where the chef starts.
   onEnd(result): result = { survived:bool, kills, maxCombo, wpn } */
function startNight(cfg, onEnd){
  // clear
  for(const e of enemies) scene.remove(e.chef); enemies.length=0;
  for(const p of PICKUPS) scene.remove(p.g); PICKUPS.length=0;
  tokensUsed=0;
  GAME.kills=0; GAME.combo=0; GAME.maxCombo=0; GAME.hitsLanded=0; GAME.onEnd=onEnd;
  // player
  if(!player){ player=makePlayer(); attachPlayerHelpers(player); }
  const ppos=(cfg.player&&cfg.player.pos)||{x:0,z:2.5};
  const pfacing=(cfg.player&&cfg.player.facing!=null)?cfg.player.facing:Math.PI;
  player.pos.set(ppos.x,0,ppos.z); player.vel.set(0,0,0); player.facing=pfacing; player.hp=player.hpMax; player._feet=false;
  player.wpn=cfg.player&&cfg.player.wpn||'fists'; player.dur=WEAPONS[player.wpn].dur; equip(player.chef,player.wpn);
  player.dead=false; player.attack=null; player.dodge=null; player.lockOn=null;
  player.grabbed=null; hideMashUI(); grabCD=0; player.tackle=null; player.tackleCD=0;
  player.hold=null; player.grabCD=0; player.steal=null; player.slam=null; player.vy=0; player.pos.y=0; hideMashUI();
  resetRagPose(player);
  player._feet=null; player.vel.set(0,0,0);
  CAM.yaw=pfacing; CAM.lockK=0;
  // larder
  for(const it of cfg.larder) spawnPickup(it.key,it.x,it.z,it.y);
  // tiki torches -- persistent deck fixtures you can grab and wield
  arena.userData.torchFlames=[];
  spawnTiki(-HALFW+2, 4.5); spawnTiki(-HALFW+2, -6.5);
  spawnTiki( HALFW-2, 4.5); spawnTiki( HALFW-2, -6.5);
  // waves
  WAVE.chunks=chunkWaves(cfg.waves, cfg.waveSizes);
  WAVE.wave=0; WAVE.resting=false; WAVE.done=false; WAVE.winT=0;
  WAVE.queue=WAVE.chunks[0]; WAVE.total=WAVE.queue.length; WAVE.spawned=0; WAVE.waveDone=false; WAVE.pending=0;
  spawnWaveChunk(300);
  updateHUDCooks(Math.min(4,WAVE.total));
  updateHUDWave();
  updateHUDHealth(); updateHUDWeapon();
  GAME.mode='play';
  GAME.paused=false; { const pe=document.getElementById('pause'); if(pe) pe.classList.remove('on'); if(master){ try{ master.gain.value=0.5; }catch(e){} } }
  document.getElementById('hud').classList.add('on');
  if(TOUCHCAP){ touchEl.classList.add('on'); if(bPause) bPause.classList.add('on'); }
  document.getElementById('veil').classList.add('hide');
  document.getElementById('hint').classList.add('on');
}
let ended=false;

  if(ended)return; ended=true; GAME.mode='over';
  const res={ survived, kills:GAME.kills, maxCombo:GAME.maxCombo, wpn:player.wpn };

/* ================================================================ LOOP */
function togglePause(){
  GAME.paused=!GAME.paused;
  const el=document.getElementById('pause'); if(el) el.classList.toggle('on', GAME.paused);
  if(master){ try{ master.gain.value = GAME.paused ? 0.0 : 0.5; }catch(e){} }   // duck the room tone while frozen
  haptic(0.25,0.2,40);
}
let last=performance.now()/1000;
function tick(){
  requestAnimationFrame(tick);
  let now=performance.now()/1000; let dt=Math.min(0.05, now-last); last=now;

  const pad=pollPad();
  // PAUSE: Start button / Esc / P -- only mid-fight. A true freeze: no sim, no
  // time advance; we just keep re-rendering the last frame until you resume.
  if((pad.start||tapK('escape')||tapK('p')) && GAME.mode==='play'){ togglePause(); }
  if(GAME.paused){
    renderer.setRenderTarget(rt); renderer.clear(); renderer.render(scene,camera);
    renderer.setRenderTarget(null); renderer.render(postScene, postCam);
    return;
  }
  GAME.t+=dt;

  // hitstop freezes sim but not render
  let sdt=dt;
  if(FX.hitstop>0){ FX.hitstop-=dt; sdt=0.0001; }

  if(GAME.mode==='play'){
    updatePlayer(sdt, pad);
    for(const e of enemies) updateEnemy(e, sdt);
    resolveBodies();                                 // hard body-to-body collision
    // reap
    for(let i=enemies.length-1;i>=0;i--) if(enemies[i]._remove) enemies.splice(i,1);
    // win: all waves spawned and nobody left standing (frame-timed so it can't be missed)
    if(!ended && WAVE.done && enemies.every(e=>e.dead)){
      WAVE.winT=(WAVE.winT||0)+dt;
      if(WAVE.winT>0.7) endNight(true);
    } else WAVE.winT=0;
  } else {
    // idle breathing on title
    if(player){ poseChef(player,true,dt); }
  }

  sparkTick(dt); ringTick(dt); kitchenTick(dt); grabCD=Math.max(0,grabCD-dt);
  // pickup bobbing (planted tikis stand still -- only the base glow pulses)
  for(const p of PICKUPS){ if(p.taken)continue;
    if(!p.planted){ p.g.position.y=p.y0+Math.sin(GAME.t*2+p.x)*0.08; p.g.rotation.y+=dt*1.2; }
    p.disc.material.opacity=0.18+Math.sin(GAME.t*4+p.z)*0.08; }
  // stove flame flicker (still an emissive cone) + tiki/torch fbm-fire time
  const flames=arena.userData.stoveFlames||[];
  for(const f of flames){ f.scale.y=1+Math.sin(GAME.t*18+f.userData.b)*0.15; f.material.emissiveIntensity=1.8+Math.sin(GAME.t*22+f.userData.b)*0.6; }
  FLAME_MAT.uniforms.uTime.value=GAME.t;   // the real flames animate entirely in-shader
  stoveGlow.intensity=0.8+Math.sin(GAME.t*16)*0.2;
  // the work-lamp's gentle overhead sway
  const lp=arena.userData.lampPivot;
  if(lp){ lp.rotation.z=Math.sin(GAME.t*0.9)*0.1; lp.rotation.x=Math.cos(GAME.t*0.7)*0.07; }
  // dust motes drifting through the light
  const md=arena.userData.motes;
  if(md){ md.points.rotation.y=GAME.t*0.015;
    const arr=md.geo.attributes.position.array;
    for(let i=0;i<md.n;i++){ arr[i*3+1]+=dt*0.12*((i%3)-1); if(arr[i*3+1]>6.8)arr[i*3+1]=0.3; if(arr[i*3+1]<0.3)arr[i*3+1]=6.8; }
    md.geo.attributes.position.needsUpdate=true; }
  // the locale billboards outside the windows
  updateLocaleTextures(dt,GAME.t);

  updateCamera(dt);
  postTick(dt);
  renderer.setRenderTarget(rt); renderer.clear(); renderer.render(scene,camera);
  renderer.setRenderTarget(null); renderer.render(postScene, postCam);
}

const _camTgt=new V3();
function updateCamera(dt){
  updateCameraVectors();
  const P=player;
  // trail the COM's ground position (body centre, incl. lean/sway) rather than the
  // raw foot point, closing the loop: COM now feeds hips, legs AND camera. Vertical
  // bob is deliberately NOT coupled in (keep the ground Y) so a hop/duck doesn't
  // jerk the camera -- P.com.y stays a rig-only channel for now.
  const target = P? _camTgt.set(P.com?P.com.x:P.pos.x, P.pos.y, P.com?P.com.z:P.pos.z) : new V3();
  const locked = !!(P && P.lockOn && !P.lockOn.dead);
  CAM.lockK = damp(CAM.lockK, locked?1:0, 5, dt);
  const k = CAM.lockK;

  // LOCK-ON: swing the camera BEHIND the player along the player->target axis,
  // so you're looking over his shoulder AT the enemy. (This used to use the
  // reverse vector, which parked the lens on the far side facing back at you.)
  if(locked){
    const t=P.lockOn.pos;
    const desired=Math.atan2(t.x-P.pos.x, t.z-P.pos.z);
    CAM.yaw=angLerp(CAM.yaw, desired, 1-Math.exp(-7*dt));
    updateCameraVectors();                       // re-derive fwd/right after the swing
  }

  let look=target.clone(); look.y=1.4;
  let want=CAM.pos.clone();
  const dir=camFwd.clone().multiplyScalar(-1); // player -> camera
  // trail behind the player, but SHORTEN the distance so the camera can never
  // sit outside the room (which would just show the back of a wall).
  const mx=HALFW-0.6, mz=HALFD-0.6;
  let dist=CAM.dist*(1-0.42*k);                  // pull in tighter when locked (was .34) -- right on the shoulder
  if(dir.x>1e-4) dist=Math.min(dist,(mx-target.x)/dir.x);
  else if(dir.x<-1e-4) dist=Math.min(dist,(-mx-target.x)/dir.x);
  if(dir.z>1e-4) dist=Math.min(dist,(mz-target.z)/dir.z);
  else if(dir.z<-1e-4) dist=Math.min(dist,(-mz-target.z)/dir.z);
  dist=Math.max(2.0,dist);
  want.copy(target).addScaledVector(dir,dist);
  want.addScaledVector(camRight, 0.95*k);        // over the shoulder: slide off-centre
  want.y=CAM.height - 0.55*k;                    // drop toward head height
  if(locked){
    // frame BOTH of you: sit the aim between the pair, biased at the enemy
    const t=P.lockOn.pos;
    const fl=new V3(lerp(P.pos.x,t.x,0.42), 1.45, lerp(P.pos.z,t.z,0.42));
    fl.addScaledVector(camRight, 0.42);          // keep the player from sliding off-frame
    look.lerp(fl, k);
  } else if(P){
    const ne=nearestEnemy(P.pos,P.facing,null);
    if(ne){ look.lerp(new V3(ne.pos.x,1.4,ne.pos.z),0.12); }
  }
  CAM.pos.lerp(want, 1-Math.exp(-(7+3*k)*dt));
  CAM.pos.x=clamp(CAM.pos.x,-mx,mx); CAM.pos.z=clamp(CAM.pos.z,-mz,mz);
  // trauma shake
  FX.trauma=Math.max(0,FX.trauma-dt*2.4);
  const s=FX.trauma*FX.trauma;
  camera.position.copy(CAM.pos);
  camera.position.x+=(Math.random()-0.5)*s*0.7;
  camera.position.y+=(Math.random()-0.5)*s*0.55;
  camera.position.z+=(Math.random()-0.5)*s*0.7;
  CAM.look.lerp(look, 1-Math.exp(-9*dt));
  _shl.copy(CAM.look);
  _shl.x+=(Math.random()-0.5)*s*0.28; _shl.y+=(Math.random()-0.5)*s*0.24;   // jitter the aim too — reads as a harder hit
  camera.lookAt(_shl);
  camera.rotation.z+=(Math.random()-0.5)*s*0.095;
  camera.fov=lerp(camera.fov, 55 - 7*k + s*5, 1-Math.exp(-7*dt));   // zoom in on lock
  camera.updateProjectionMatrix();
}

/* Force fullscreen + landscape when you start. Browsers only allow this from a
   real user gesture, so it's fired off the STEP-TO-THE-PASS / rematch taps.
   Vendor-prefixed for old WebKit; orientation lock is best-effort (throws on
   desktop / when not fullscreen, hence the catch). iOS Safari ignores the
   Fullscreen API entirely -- that path is covered by the apple-mobile-web-app
   meta tags + manifest, i.e. Add to Home Screen runs it chromeless. */
function goFullscreen(){
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(req && !document.fullscreenElement && !document.webkitFullscreenElement){
    try{ const p=req.call(el); if(p&&p.then) p.then(lockLandscape).catch(()=>{}); else lockLandscape(); }catch(e){}
  } else lockLandscape();
}
function lockLandscape(){ try{ if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{}); }catch(e){} }
